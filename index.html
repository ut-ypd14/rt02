<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>巡檢人員點檢首頁</title>
  <script src="./config.js"></script>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#64748b;
      --line:#e5e7eb;
      --main:#2563eb;
      --main2:#1d4ed8;
      --ok:#16a34a;
      --warn:#f59e0b;
      --bad:#dc2626;
      --soft:#eef4ff;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.14), transparent 34%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .page{
      width:min(1120px, 100%);
      margin:0 auto;
      padding:16px 12px 26px;
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:2px 0 12px;
    }

    .title{
      margin:0;
      font-size:23px;
      line-height:1.18;
      letter-spacing:.02em;
      font-weight:900;
    }

    .top-link{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      color:#ffffff;
      background:linear-gradient(135deg, var(--main), var(--main2));
      border:1px solid rgba(29,78,216,.2);
      padding:8px 13px;
      border-radius:999px;
      font-size:14px;
      font-weight:900;
      text-decoration:none;
      box-shadow:0 10px 22px rgba(37,99,235,.18);
      white-space:nowrap;
    }

    .top-link:active{ transform:scale(.98); }

    .status-line{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      align-items:center;
      gap:8px;
      min-height:46px;
      margin-bottom:14px;
      padding:10px 12px;
      border:1px solid rgba(226,232,240,.95);
      border-radius:16px;
      background:rgba(255,255,255,.94);
      box-shadow:0 8px 20px rgba(15,23,42,.06);
      overflow:hidden;
      white-space:nowrap;
    }

    .status-text{
      min-width:0;
      color:var(--text);
      font-size:15px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
    }

    .gas-inline{
      min-width:0;
      display:inline-flex;
      align-items:center;
      justify-content:flex-end;
      gap:7px;
      color:var(--text);
      font-size:15px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
    }

    .gas-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:var(--warn);
      box-shadow:0 0 0 4px rgba(245,158,11,.14);
      flex:0 0 auto;
    }
    .gas-dot.ok{ background:var(--ok); box-shadow:0 0 0 4px rgba(22,163,74,.13); }
    .gas-dot.bad{ background:var(--bad); box-shadow:0 0 0 4px rgba(220,38,38,.13); }

    .grid{ display:grid; gap:14px; }

    .card{
      border:1px solid rgba(226,232,240,.96);
      border-radius:var(--radius);
      background:rgba(255,255,255,.96);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px 10px;
      border-bottom:1px solid rgba(226,232,240,.76);
      background:linear-gradient(180deg, rgba(248,251,255,.95), rgba(255,255,255,.95));
    }

    .card-title{
      margin:0;
      font-size:18px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .count-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:4px 10px;
      border-radius:999px;
      color:#1d4ed8;
      background:var(--soft);
      border:1px solid rgba(147,197,253,.42);
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
    }

    .card-body{ padding:14px 16px 16px; }

    .group-block + .group-block{ margin-top:16px; }

    .group-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0 0 8px;
      padding:9px 11px;
      border-radius:14px;
      background:#f8fafc;
      border:1px solid rgba(226,232,240,.9);
      font-size:15px;
      line-height:1.2;
      font-weight:900;
    }

    .group-title small{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .table-wrap{
      width:100%;
      overflow:auto;
      border:1px solid rgba(226,232,240,.95);
      border-radius:14px;
      background:#ffffff;
    }

    table{
      width:100%;
      min-width:620px;
      border-collapse:separate;
      border-spacing:0;
      font-size:14px;
    }

    th, td{
      padding:8px 7px;
      border-bottom:1px solid rgba(226,232,240,.9);
      text-align:left;
      vertical-align:middle;
      white-space:nowrap;
    }

    th{
      position:sticky;
      top:0;
      z-index:1;
      color:#475569;
      background:#f8fafc;
      font-size:12px;
      font-weight:900;
    }

    tr:last-child td{ border-bottom:0; }

    td{ color:#1f2937; font-weight:750; }

    .seq{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:28px;
      height:28px;
      border-radius:999px;
      color:#1d4ed8;
      background:#eff6ff;
      border:1px solid rgba(147,197,253,.46);
      font-weight:900;
    }

    .btn{
      min-height:34px;
      border:0;
      border-radius:999px;
      padding:7px 12px;
      color:#ffffff;
      background:linear-gradient(135deg, var(--main), var(--main2));
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(37,99,235,.16);
      white-space:nowrap;
    }

    .btn:active{ transform:scale(.98); }

    .empty{
      padding:22px 12px;
      color:var(--muted);
      background:#f8fafc;
      border:1px dashed #cbd5e1;
      border-radius:14px;
      text-align:center;
      font-size:15px;
      font-weight:850;
    }

    .clear-area{
      display:flex;
      justify-content:center;
      margin-top:16px;
    }

    .clear-btn{
      min-width:130px;
      min-height:42px;
      border:1px solid rgba(220,38,38,.2);
      border-radius:999px;
      color:#b91c1c;
      background:#fff5f5;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    .clear-btn:active{ transform:scale(.98); }

    .msg{
      min-height:21px;
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      font-weight:850;
      text-align:center;
    }

    .msg.ok{ color:var(--ok); }
    .msg.bad{ color:var(--bad); }
    .msg.warn{ color:#b45309; }

    @media (max-width:720px){
      .page{ padding:14px 10px 24px; }
      .hero{ align-items:flex-start; }
      .title{ font-size:20px; }
      .top-link{ margin-top:1px; padding:8px 11px; }
      .status-line{ gap:6px; padding:9px 10px; }
      .status-text{ font-size:14px; }
      .gas-inline{ font-size:14px; }
      .card-head{ padding:12px 13px 9px; }
      .card-body{ padding:12px 13px 14px; }
      table{ min-width:600px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1 class="title">巡檢人員點檢首頁</h1>
      <a class="top-link" href="./form.html" id="formEntryLink">進入點檢表</a>
    </section>

    <section class="status-line" aria-label="目前狀態">
      <span class="status-text" id="currentIdText">訪客</span>
      <span class="status-text" id="localTimeText">--</span>
      <span class="gas-inline"><span class="gas-dot" id="gasDot"></span><span id="gasStatusText">GAS</span></span>
    </section>

    <section class="grid">
      <section class="card" aria-label="工作日誌">
        <div class="card-head">
          <h2 class="card-title">工作日誌</h2>
          <span class="count-pill" id="recordCountText">0 筆</span>
        </div>
        <div class="card-body">
          <div id="historyArea" class="empty">目前沒有可編輯紀錄</div>
          <div class="msg" id="historyMsg"></div>
        </div>
      </section>
    </section>

    <div class="clear-area">
      <button type="button" class="clear-btn" id="clearLoginDraftBtn">清除</button>
    </div>
    <div class="msg" id="actionMsg"></div>
  </main>

  <script>
    'use strict';

    const APP_VERSION = 'index v0.1.12';

    const LOGIN_DRAFT_KEY = 'PI_LOGIN_DRAFT_V001';
    const SHORT_AUTH_KEY = 'PI_SHORT_AUTH_V001';
    const WORK_LOG_KEY = 'PI_WORK_LOG_DRAFT_V001';
    const FORM_RESTORE_KEY = 'PI_FORM_RESTORE_DRAFT_V001';

    const el = {
      currentIdText:document.getElementById('currentIdText'),
      localTimeText:document.getElementById('localTimeText'),
      gasDot:document.getElementById('gasDot'),
      gasStatusText:document.getElementById('gasStatusText'),
      recordCountText:document.getElementById('recordCountText'),
      historyArea:document.getElementById('historyArea'),
      historyMsg:document.getElementById('historyMsg'),
      clearLoginDraftBtn:document.getElementById('clearLoginDraftBtn'),
      actionMsg:document.getElementById('actionMsg')
    };

    let groupedTodayHistory = [];

    document.addEventListener('DOMContentLoaded', init);

    function init(){
      bindEvents();
      renderCurrentId();
      startClock();
      pingGasByGet();
      loadAndRenderHistory();
    }

    function bindEvents(){
      el.clearLoginDraftBtn.addEventListener('click', clearLoginDrafts);

      window.addEventListener('focus', loadAndRenderHistory);
      window.addEventListener('pageshow', loadAndRenderHistory);
      document.addEventListener('visibilitychange', function(){
        if (!document.hidden) loadAndRenderHistory();
      });
      window.addEventListener('storage', function(evt){
        if (!evt || !evt.key || isPossibleWorkLogKey(evt.key)) loadAndRenderHistory();
      });
    }

    function clearLoginDrafts(){
      localStorage.removeItem(LOGIN_DRAFT_KEY);
      localStorage.removeItem(SHORT_AUTH_KEY);
      sessionStorage.removeItem(FORM_RESTORE_KEY);
      renderCurrentId();
      setMsg(el.actionMsg, 'ok', '已清除');
    }

    function readJsonStorage(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const data = JSON.parse(raw);
        return data == null ? fallback : data;
      }catch(err){
        return fallback;
      }
    }

    function writeSessionJsonStorage(key, value){
      sessionStorage.setItem(key, JSON.stringify(value));
    }

    function getLoginDraft(){
      return readJsonStorage(LOGIN_DRAFT_KEY, null);
    }

    function getShortAuthDraft(){
      return readJsonStorage(SHORT_AUTH_KEY, null);
    }

    function getCurrentId(){
      const shortAuth = getShortAuthDraft();
      const loginDraft = getLoginDraft();
      return normalizeText(
        getFirstValue(shortAuth, ['id']) ||
        getFirstValue(loginDraft, ['id']) ||
        ''
      ).toUpperCase();
    }

    function renderCurrentId(){
      const id = getCurrentId();
      el.currentIdText.textContent = id || '訪客';
    }

    function startClock(){
      renderClock();
      window.setInterval(renderClock, 1000);
    }

    function renderClock(){
      el.localTimeText.textContent = formatMmDdHhMmSs(new Date());
    }

    function setGasStatus(status, text){
      el.gasDot.classList.remove('ok', 'bad');
      if (status === 'ok') el.gasDot.classList.add('ok');
      else if (status === 'bad') el.gasDot.classList.add('bad');
      el.gasStatusText.textContent = text;
    }

    function pingGasByGet(){
      if (typeof api_url === 'undefined' || !api_url){
        setGasStatus('bad', 'GAS');
        return;
      }

      setGasStatus('warn', 'GAS');

      fetch(api_url, { method:'GET', cache:'no-store' })
        .then(function(res){ return res.text(); })
        .then(function(text){
          if (isOkResponseText(text)) setGasStatus('ok', 'GAS');
          else setGasStatus('bad', 'GAS');
        })
        .catch(function(){
          setGasStatus('bad', 'GAS');
        });
    }

    function isOkResponseText(text){
      const raw = String(text || '').trim();
      if (!raw) return false;

      try{
        const data = JSON.parse(raw);
        return data && String(data.status || '').toLowerCase() === 'ok';
      }catch(err){
        return raw.toLowerCase().indexOf('ok') >= 0;
      }
    }

    function loadAndRenderHistory(){
      renderCurrentId();
      clearMsg(el.historyMsg);

      const workLogItems = readWorkLogItems();
      const rawRecords = normalizeWorkLogRows(workLogItems);
      const todayRecords = rawRecords.filter(isRecordWorkTimeToday);

      if (rawRecords.length > 0 && todayRecords.length === 0){
        setMsg(el.historyMsg, 'warn', '已讀到 ' + rawRecords.length + ' 筆草稿，但工作時間不是今天');
      }

      groupedTodayHistory = buildTodayGroups(todayRecords);
      renderTodayGroups(rawRecords.length);
    }

    function readWorkLogItems(){
      const exactData = readJsonStorage(WORK_LOG_KEY, null);
      if (isWorkLogItemList(exactData)) return exactData;

      const candidateKeys = [
        'WORK_LOG_KEY',
        'PI_WORK_LOG_DRAFT_V001',
        'PI_WORK_LOG_V001',
        'PI_FORM_WORK_LOG_V001',
        'PI_FORM_HISTORY_V001'
      ];

      for (let i = 0; i < candidateKeys.length; i++){
        const key = candidateKeys[i];
        if (key === WORK_LOG_KEY) continue;
        const data = readJsonStorage(key, null);
        if (isWorkLogItemList(data)) return data;
      }

      for (let i = 0; i < localStorage.length; i++){
        const key = localStorage.key(i);
        const data = readJsonStorage(key, null);
        if (isWorkLogItemList(data)) return data;
      }

      return [];
    }

    function isPossibleWorkLogKey(key){
      const k = String(key || '');
      return k === WORK_LOG_KEY || k.indexOf('WORK_LOG') >= 0 || k.indexOf('FORM_HISTORY') >= 0;
    }

    function isWorkLogItemList(data){
      if (!Array.isArray(data)) return false;
      if (data.length === 0) return true;
      return data.some(function(item){
        return item && typeof item === 'object' && Array.isArray(item.row);
      });
    }

    function normalizeWorkLogRows(items){
      if (!Array.isArray(items)) return [];
      return items
        .filter(function(item){ return item && typeof item === 'object' && Array.isArray(item.row); })
        .map(function(item){ return item.row; })
        .filter(function(row){ return Array.isArray(row) && row.length >= 10; });
    }

    function buildTodayGroups(records){
      const map = {};

      records.forEach(function(record, index){
        const key = getHistoryKey(record) || '未分類';
        if (!map[key]) map[key] = { key:key, rows:[], latestTime:0 };

        const timeValue = getRecordTimeValue(record);
        map[key].rows.push({ record:record, originalIndex:index, timeValue:timeValue });
        if (timeValue > map[key].latestTime) map[key].latestTime = timeValue;
      });

      const groups = Object.keys(map).map(function(key){ return map[key]; });

      groups.forEach(function(group){
        group.rows.sort(function(a, b){
          if (a.timeValue !== b.timeValue) return b.timeValue - a.timeValue;
          return b.originalIndex - a.originalIndex;
        });
      });

      groups.sort(function(a, b){
        if (a.latestTime !== b.latestTime) return b.latestTime - a.latestTime;
        return compareHistoryKeyDesc(a.key, b.key);
      });

      return groups;
    }

    function renderTodayGroups(rawCount){
      const total = groupedTodayHistory.reduce(function(sum, group){
        return sum + group.rows.length;
      }, 0);

      el.recordCountText.textContent = total + ' 筆';
      el.historyArea.innerHTML = '';

      if (!groupedTodayHistory.length){
        el.historyArea.className = 'empty';
        el.historyArea.textContent = rawCount > 0 ? '有草稿，但工作時間不屬於今天' : '目前沒有可編輯紀錄';
        return;
      }

      el.historyArea.className = '';
      let seq = 1;

      groupedTodayHistory.forEach(function(group){
        const block = document.createElement('section');
        block.className = 'group-block';

        const title = document.createElement('h3');
        title.className = 'group-title';

        const label = document.createElement('span');
        label.textContent = formatHistoryKeyLabel(group.key);

        const small = document.createElement('small');
        small.textContent = group.rows.length + ' 筆';

        title.appendChild(label);
        title.appendChild(small);
        block.appendChild(title);

        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';

        const table = document.createElement('table');
        table.appendChild(buildTableHead());

        const tbody = document.createElement('tbody');
        group.rows.forEach(function(item){
          tbody.appendChild(buildHistoryRow(item.record, seq));
          seq += 1;
        });
        table.appendChild(tbody);
        wrap.appendChild(table);
        block.appendChild(wrap);
        el.historyArea.appendChild(block);
      });
    }

    function buildTableHead(){
      const thead = document.createElement('thead');
      const tr = document.createElement('tr');
      [
        '#',
        '日期',
        '班',
        '機台',
        '狀態',
        '作業料號',
        '例',
        '時間',
        '編輯'
      ].forEach(function(text){
        const th = document.createElement('th');
        th.textContent = text;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      return thead;
    }

    function buildHistoryRow(record, seq){
      const tr = document.createElement('tr');
      const historyKey = getHistoryKey(record);
      const keyParts = parseHistoryKey(historyKey);

      appendCell(tr, makeSeq(seq));
      appendCell(tr, formatTableDateText(keyParts.dateText));
      appendCell(tr, keyParts.shift || '');
      appendCell(tr, getDisplayMachineId(record));
      appendCell(tr, getDisplayItem(record, 1));
      appendCell(tr, getDisplayItem(record, 2));
      appendCell(tr, formatRoutineCheck(getDisplayRoutineCheck(record)));
      appendCell(tr, getDisplayWorkTime(record));

      const actionTd = document.createElement('td');
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn';
      btn.textContent = '編輯';
      btn.addEventListener('click', function(){
        passRecordToForm(record);
      });
      actionTd.appendChild(btn);
      tr.appendChild(actionTd);

      return tr;
    }

    function appendCell(tr, content){
      const td = document.createElement('td');
      if (content instanceof Node) td.appendChild(content);
      else td.textContent = content == null ? '' : String(content);
      tr.appendChild(td);
    }

    function makeSeq(seq){
      const span = document.createElement('span');
      span.className = 'seq';
      span.textContent = String(seq);
      return span;
    }

    function passRecordToForm(record){
      clearMsg(el.historyMsg);

      const currentId = getCurrentId();
      const recordOwnerId = getRecordOwnerId(record);

      if (!currentId || !recordOwnerId || currentId !== recordOwnerId){
        return;
      }

      writeSessionJsonStorage(FORM_RESTORE_KEY, record);
      window.location.href = './form.html';
    }

    function isRecordWorkTimeToday(record){
      const raw = getRecordTimeRaw(record);
      if (!raw) return false;

      const today = new Date();
      const mmddDash = pad2(today.getMonth() + 1) + '-' + pad2(today.getDate());
      const mmddSlash = pad2(today.getMonth() + 1) + '/' + pad2(today.getDate());

      if (raw.indexOf(mmddDash) >= 0 || raw.indexOf(mmddSlash) >= 0) return true;

      const timeValue = getRecordTimeValue(record);
      if (!timeValue) return false;

      const d = new Date(timeValue);
      return d.getFullYear() === today.getFullYear() &&
        d.getMonth() === today.getMonth() &&
        d.getDate() === today.getDate();
    }

    function getHistoryKey(record){
      const dateText = getDisplayFormDate(record);
      const shift = normalizeText(record[3]).toUpperCase();
      if (dateText && shift) return dateText + '|' + shift;
      return '';
    }

    function parseHistoryKey(key){
      const parts = String(key || '').split('|');
      return {
        dateText:parts[0] || '',
        shift:(parts[1] || '').toUpperCase()
      };
    }

    function formatHistoryKeyLabel(key){
      const parsed = parseHistoryKey(key);
      const date = parsed.dateText.replace(/^\d{4}\//, '');
      return (date || parsed.dateText || '--') + ' ' + (parsed.shift || '-');
    }

    function compareHistoryKeyDesc(a, b){
      const pa = parseHistoryKey(a);
      const pb = parseHistoryKey(b);
      const da = historyDateNumber(pa.dateText);
      const db = historyDateNumber(pb.dateText);
      if (da !== db) return db - da;
      return shiftNumber(pb.shift) - shiftNumber(pa.shift);
    }

    function historyDateNumber(dateText){
      const s = String(dateText || '').replace(/[^0-9]/g, '');
      if (s.length >= 8) return Number(s.slice(0, 8)) || 0;
      return Number(s) || 0;
    }

    function shiftNumber(shift){
      if (shift === 'A') return 1;
      if (shift === 'B') return 2;
      if (shift === 'C') return 3;
      return 0;
    }

    function getRecordOwnerId(record){
      return normalizeText(record[5]).toUpperCase();
    }

    function getDisplayFormDate(record){
      return formatFormDateValue(record[2]);
    }

    function getDisplayMachineId(record){
      return normalizeText(record[4]);
    }

    function getDisplayRoutineCheck(record){
      return normalizeText(record[7]);
    }

    function getDisplayItem(record, no){
      const index = 7 + Number(no);
      return normalizeText(record[index]);
    }

    function getDisplayWorkTime(record){
      const raw = getRecordTimeRaw(record);
      if (!raw) return '';
      return formatWorkTimeText(raw);
    }

    function getRecordTimeValue(record){
      return parseTimeValue(getRecordTimeRaw(record));
    }

    function getRecordTimeRaw(record){
      return normalizeText(record[1]);
    }

    function formatFormDateValue(value){
      const s = String(value == null ? '' : value).trim();
      if (!s) return '';

      if (/^\d+(?:\.\d+)?$/.test(s)){
        const serial = Number(s);
        if (serial > 20000 && serial < 80000){
          const ms = Math.round((serial - 25569) * 86400000);
          const d = new Date(ms);
          return d.getUTCFullYear() + '/' + pad2(d.getUTCMonth() + 1) + '/' + pad2(d.getUTCDate());
        }
      }

      const m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (m) return m[1] + '/' + pad2(m[2]) + '/' + pad2(m[3]);

      const md = s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
      if (md) return new Date().getFullYear() + '/' + pad2(md[1]) + '/' + pad2(md[2]);

      return s;
    }

    function formatTableDateText(value){
      const s = String(value == null ? '' : value).trim();
      if (!s) return '';

      let m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
      if (m) return pad2(m[2]) + '/' + pad2(m[3]);

      m = s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
      if (m) return pad2(m[1]) + '/' + pad2(m[2]);

      return s;
    }

    function formatRoutineCheck(value){
      const v = String(value || '').trim().toUpperCase();
      if (v === 'TRUE' || v === 'Y' || v === 'YES' || v === '1') return '是';
      if (v === 'FALSE' || v === 'N' || v === 'NO' || v === '0' || v === '') return '否';
      return value;
    }

    function formatWorkTimeText(raw){
      const s = String(raw || '').trim();
      if (!s) return '';

      let m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{1,2})/);
      if (m){
        return pad2(m[4]) + ':' + pad2(m[5]);
      }

      m = s.match(/^(\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{1,2})/);
      if (m){
        return pad2(m[3]) + ':' + pad2(m[4]);
      }

      return s;
    }

    function parseTimeValue(raw){
      const s = String(raw || '').trim();
      let m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
      if (m){
        return new Date(
          Number(m[1]),
          Number(m[2]) - 1,
          Number(m[3]),
          Number(m[4]),
          Number(m[5]),
          Number(m[6] || 0)
        ).getTime() || 0;
      }

      m = s.match(/^(\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
      if (m){
        const now = new Date();
        return new Date(
          now.getFullYear(),
          Number(m[1]) - 1,
          Number(m[2]),
          Number(m[3]),
          Number(m[4]),
          Number(m[5] || 0)
        ).getTime() || 0;
      }

      return 0;
    }

    function getFirstValue(obj, names){
      if (!obj || typeof obj !== 'object') return '';
      for (let i = 0; i < names.length; i++){
        const name = names[i];
        if (Object.prototype.hasOwnProperty.call(obj, name) && obj[name] != null && obj[name] !== '') return obj[name];
      }
      return '';
    }

    function normalizeText(value){
      return String(value == null ? '' : value).trim();
    }

    function pad2(n){
      return String(n).padStart(2, '0');
    }

    function formatMmDdHhMmSs(d){
      return pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) + ' ' +
        pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
    }

    function setMsg(target, type, text){
      target.className = 'msg ' + (type || '');
      target.textContent = text || '';
    }

    function clearMsg(target){
      target.className = 'msg';
      target.textContent = '';
    }
  </script>
</body>

<!doctype html>
<html lang="zh-Hant">
<head>
  <script src="./config.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>人員登入 v0.1.2</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d0d7de;
      --main: #2563eb;
      --danger: #b91c1c;
      --warn: #b45309;
      --ok: #047857;
      --shadow: 0 8px 24px rgba(15, 23, 42, .10);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    body {
      padding: 14px;
      padding-bottom: calc(22px + env(safe-area-inset-bottom));
    }
    .wrap {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }
    .title {
      margin: 8px 0 4px;
      font-size: 25px;
      line-height: 1.25;
      font-weight: 850;
    }
    .ver {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .server {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-size: 14px;
      color: var(--muted);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
      flex: 0 0 auto;
    }
    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--danger); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-weight: 800;
      margin: 14px 0 6px;
      font-size: 16px;
    }
    input, button {
      width: 100%;
      min-height: 52px;
      font-size: 19px;
      border-radius: 15px;
      font-family: inherit;
    }
    input {
      border: 1px solid var(--line);
      padding: 11px 13px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .16);
    }
    button {
      border: 0;
      padding: 13px;
      font-weight: 850;
      background: var(--main);
      color: #fff;
      margin-top: 16px;
      cursor: pointer;
      touch-action: manipulation;
    }
    button.ghost {
      color: var(--main);
      border: 1px solid var(--main);
      background: #fff;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .msg {
      min-height: 24px;
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--danger); }
    .msg.warn { color: var(--warn); }
    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      margin-top: 10px;
    }
    .hide { display: none !important; }
    .draftBox {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 14px;
      line-height: 1.55;
    }
    iframe {
      width: 1px;
      height: 1px;
      position: absolute;
      left: -9999px;
      top: -9999px;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">人員登入</h1>
    <div class="ver">版本 v0.1.2｜手機瀏覽器相容版｜POST-only</div>

    <div class="server" aria-live="polite">
      <span id="gasDot" class="dot"></span>
      <span id="gasText">GAS 伺服狀態：檢查中...</span>
    </div>

    <section class="card">
      <label for="idInput">工號</label>
      <input id="idInput" type="text" inputmode="latin" autocomplete="username" autocapitalize="characters" maxlength="5" placeholder="5碼英數，例如 A1234">

      <label for="passInput">密碼</label>
      <input id="passInput" type="password" inputmode="latin" autocomplete="current-password" autocapitalize="none" maxlength="32" placeholder="英數">

      <button id="loginBtn" type="button">驗證登入</button>
      <button id="clearBtn" class="ghost" type="button">清除本機草稿</button>

      <div id="msg" class="msg"></div>
      <div id="draftBox" class="draftBox hide"></div>

      <div class="note">
        前端只檢查格式是否可送出；帳密、人員狀態、權限均由 GAS 判斷。驗證成功後建立 13H 短暫通行草稿，供單純輸入表單減少讀取人員主檔。
      </div>
    </section>
  </div>

  <iframe id="statusFrame" name="statusFrame" title="statusFrame"></iframe>
  <iframe id="postFrame" name="postFrame" title="postFrame"></iframe>

  <script>
    "use strict";

    const APP_VERSION = "v0.1.2";
    const STORAGE_LOGIN = "PI_LOGIN_DRAFT_V001";
    const STORAGE_SHORT_AUTH = "PI_SHORT_AUTH_V001";
    const SHORT_AUTH_MS = 13 * 60 * 60 * 1000;
    const DEFAULT_BACK_URL = "admin.html";

    const $ = (id) => document.getElementById(id);
    let pendingAction = "";
    let statusTimer = 0;

    document.addEventListener("DOMContentLoaded", () => {
      $("loginBtn").addEventListener("click", login);
      $("clearBtn").addEventListener("click", clearDrafts);
      $("idInput").addEventListener("input", () => {
        $("idInput").value = normalizeId($("idInput").value);
      });
      $("passInput").addEventListener("input", () => {
        $("passInput").value = normalizePass($("passInput").value);
      });
      loadExistingDraft();
      checkGasStatus();
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.action === "server_status") {
        handleServerStatus(data);
        return;
      }

      if (data.action === pendingAction) {
        handleGasMessage(data);
      }
    });

    function getApiUrl() {
      return String(window.api_url || "").trim();
    }

    function isApiUrlReady() {
      return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(getApiUrl());
    }

    function normalizeId(value) {
      return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 5);
    }

    function normalizePass(value) {
      return String(value || "").replace(/[^A-Za-z0-9]/g, "").slice(0, 32);
    }

    function validId(value) {
      return /^[A-Z0-9]{5}$/.test(value);
    }

    function validPass(value) {
      return /^[A-Za-z0-9]+$/.test(value);
    }

    function setMsg(text, type) {
      const el = $("msg");
      el.textContent = text || "";
      el.className = "msg " + (type || "");
    }

    function setBusy(isBusy) {
      $("loginBtn").disabled = isBusy;
      $("clearBtn").disabled = isBusy;
    }

    function setGasStatus(text, type) {
      $("gasText").textContent = "GAS 伺服狀態：" + text;
      $("gasDot").className = "dot " + (type || "");
    }

    function checkGasStatus() {
      if (!isApiUrlReady()) {
        setGasStatus("config.js 的 api_url 未設定", "err");
        return;
      }

      setGasStatus("檢查中...", "");
      const api = getApiUrl();
      const sep = api.indexOf("?") >= 0 ? "&" : "?";
      $("statusFrame").src = api + sep + "action=server_status&t=" + encodeURIComponent(Date.now());

      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => {
        setGasStatus("無回應", "err");
      }, 7000);
    }

    function handleServerStatus(data) {
      clearTimeout(statusTimer);
      if (data.status === "ok") {
        setGasStatus("正常", "ok");
      } else {
        setGasStatus(data.msg || "異常", "err");
      }
    }

    function loadExistingDraft() {
      const draft = readJson(STORAGE_LOGIN);
      if (draft && draft.id) $("idInput").value = normalizeId(draft.id);
      if (draft && draft.pass) $("passInput").value = normalizePass(draft.pass);

      const box = $("draftBox");
      if (draft && draft.id) {
        box.classList.remove("hide");
        box.textContent = "已讀取本機帳密草稿：" + normalizeId(draft.id) + "。請按驗證登入更新 13H 短暫通行草稿。";
      } else {
        box.classList.add("hide");
        box.textContent = "";
      }
    }

    function login() {
      const id = normalizeId($("idInput").value);
      const pass = normalizePass($("passInput").value);
      $("idInput").value = id;
      $("passInput").value = pass;

      if (!validId(id)) {
        setMsg("工號格式錯誤：需 5 碼英數。", "err");
        return;
      }
      if (!validPass(pass)) {
        setMsg("密碼格式錯誤：只允許英數，且不可空白。", "err");
        return;
      }
      if (!isApiUrlReady()) {
        setMsg("config.js 的 api_url 尚未設定或格式錯誤。", "err");
        return;
      }

      pendingAction = "auth";
      setBusy(true);
      setMsg("驗證中...", "warn");
      postToGas({ action: "auth", id: id, pass: pass });
    }

    function handleGasMessage(data) {
      setBusy(false);
      pendingAction = "";

      if (data.status === "ok") {
        const now = Date.now();
        const id = normalizeId($("idInput").value);
        const pass = normalizePass($("passInput").value);

        writeJson(STORAGE_LOGIN, {
          id: id,
          pass: pass,
          saved_at: now
        });

        writeJson(STORAGE_SHORT_AUTH, {
          id: normalizeId(data.id || id),
          name: String(data.name || ""),
          default_shift: String(data.default_shift || ""),
          admin: data.admin === true,
          auth_at: now,
          expire_at: now + SHORT_AUTH_MS,
          scope: "input"
        });

        setMsg("驗證通過。3 秒後返回上一頁並刷新。", "ok");
        setTimeout(goBackRefresh, 3000);
        return;
      }

      setMsg("驗證失敗：" + mapMsg(data.msg), "err");
    }

    function postToGas(params) {
      const api = getApiUrl();
      const body = new URLSearchParams();
      Object.keys(params).forEach((key) => body.set(key, params[key]));

      const form = document.createElement("form");
      form.method = "post";
      form.action = api;
      form.target = "postFrame";
      form.style.display = "none";

      body.forEach((value, key) => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = value;
        form.appendChild(input);
      });

      document.body.appendChild(form);
      form.submit();
      setTimeout(() => {
        try { document.body.removeChild(form); } catch (err) {}
      }, 1000);
    }

    function getBackUrl() {
      const url = new URL(window.location.href);
      return url.searchParams.get("back") || document.referrer || DEFAULT_BACK_URL;
    }

    function goBackRefresh() {
      const back = getBackUrl();
      const sep = back.indexOf("?") >= 0 ? "&" : "?";
      window.location.href = back + sep + "_r=" + encodeURIComponent(Date.now());
    }

    function clearDrafts() {
      localStorage.removeItem(STORAGE_LOGIN);
      localStorage.removeItem(STORAGE_SHORT_AUTH);
      $("idInput").value = "";
      $("passInput").value = "";
      $("draftBox").classList.add("hide");
      $("draftBox").textContent = "";
      setMsg("已清除本機草稿。", "ok");
    }

    function readJson(key) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        return null;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function mapMsg(msg) {
      const table = {
        bad_action: "後端路由錯誤。",
        invalid_id: "工號格式錯誤。",
        invalid_pass: "密碼格式錯誤。",
        auth_failed: "帳號或密碼錯誤。",
        config_missing: "GAS 尚未設定試算表 ID。",
        user_sheet_not_found: "找不到人員主檔 Sheet。",
        server_error: "伺服器錯誤。"
      };
      return table[msg] || msg || "未知錯誤。";
    }
  </script>
</body>
</html>

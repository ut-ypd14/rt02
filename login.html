<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>人員登入</title>
  <script src="./config.js"></script>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#d8dee9;--ok:#087443;--bad:#b42318;--warn:#a15c07;--main:#1f5eff;}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;font-size:16px;line-height:1.45}
    .wrap{width:100%;max-width:520px;margin:0 auto;padding:14px 12px 28px}
    .status{padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:12px;font-size:14px;color:var(--muted)}
    .status.ok{border-color:#abefc6;color:var(--ok);background:#ecfdf3}.status.bad{border-color:#fecdca;color:var(--bad);background:#fef3f2}.status.warn{border-color:#fedf89;color:var(--warn);background:#fffaeb}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 20px rgba(16,24,40,.06)}
    h1{font-size:22px;margin:0 0 6px}.sub{margin:0 0 18px;color:var(--muted);font-size:14px}
    label{display:block;margin-top:14px;font-weight:700}.hint{font-size:13px;color:var(--muted);margin-top:4px}
    input{width:100%;min-height:48px;margin-top:7px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:18px;background:#fff;outline:none}
    input:focus{border-color:var(--main);box-shadow:0 0 0 3px rgba(31,94,255,.12)}
    button{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:14px;background:var(--main);color:white;font-size:17px;font-weight:800;letter-spacing:.04em}
    button:disabled{opacity:.55}.msg{min-height:22px;margin-top:14px;font-weight:700}.msg.ok{color:var(--ok)}.msg.bad{color:var(--bad)}.msg.warn{color:var(--warn)}
    .ver{margin-top:12px;text-align:center;color:#98a2b3;font-size:12px}
  </style>
</head>
<body>
  <main class="wrap">
    <div id="gasStatus" class="status warn">GAS 伺服狀態：檢查中...</div>
    <section class="card">
      <h1>人員登入</h1>
      <p class="sub">輸入工號與密碼。前端只檢查格式，帳密與人員狀態由 GAS 判斷。</p>
      <form id="loginForm" autocomplete="off">
        <label for="idInput">工號</label>
        <input id="idInput" name="id" inputmode="text" autocomplete="off" maxlength="5" placeholder="5碼英數" autocapitalize="characters">
        <div class="hint">英數 5 碼，自動轉大寫。</div>
        <label for="passInput">密碼</label>
        <input id="passInput" name="pass" type="password" inputmode="text" autocomplete="off" placeholder="英數密碼">
        <div class="hint">僅接受英數。</div>
        <button id="submitBtn" type="submit">登入</button>
      </form>
      <div id="msg" class="msg"></div>
    </section>
    <div class="ver">login.html v0.1.8</div>
  </main>
<script>
(function(){
  'use strict';
  var VERSION = 'login.html v0.1.8';
  var LOGIN_KEY = 'PI_LOGIN_DRAFT_V001';
  var SHORT_KEY = 'PI_SHORT_AUTH_V001';
  var SHORT_AUTH_MS = 13 * 60 * 60 * 1000;

  var gasStatus = document.getElementById('gasStatus');
  var msg = document.getElementById('msg');
  var form = document.getElementById('loginForm');
  var idInput = document.getElementById('idInput');
  var passInput = document.getElementById('passInput');
  var submitBtn = document.getElementById('submitBtn');

  function setMsg(text, type){
    msg.textContent = text || '';
    msg.className = 'msg' + (type ? ' ' + type : '');
  }

  function setGasStatus(text, type){
    gasStatus.textContent = 'GAS 伺服狀態：' + text;
    gasStatus.className = 'status ' + (type || 'warn');
  }

  function getApiUrl(){
    if (typeof api_url !== 'string' || !api_url) return '';
    return api_url;
  }

  function normalizeId(v){
    return String(v || '').trim().toUpperCase();
  }

  function validId(v){
    return /^[A-Z0-9]{5}$/.test(v);
  }

  function validPass(v){
    return /^[A-Za-z0-9]+$/.test(String(v || ''));
  }

  function toMap(data){
    var out = {};
    if (!data || !data.fields || !data.values) return out;
    for (var i = 0; i < data.fields.length; i++) out[data.fields[i]] = data.values[i];
    return out;
  }

  function postAction(action, payload){
    var url = getApiUrl();
    if (!url) return Promise.reject(new Error('api_url_not_set'));
    var params = new URLSearchParams();
    params.append('action', action);
    params.append('_t', String(Date.now()));
    if (payload) {
      Object.keys(payload).forEach(function(k){ params.append(k, payload[k] == null ? '' : String(payload[k])); });
    }
    return fetch(url, { method:'POST', body:params, credentials:'omit', cache:'no-store' })
      .then(function(res){ return res.text(); })
      .then(function(text){
        try { return JSON.parse(text); }
        catch (err) { throw new Error('json_parse_failed'); }
      });
  }

  function saveDrafts(id, pass, user){
    var now = Date.now();
    var name = String(user.name || '');
    localStorage.setItem(LOGIN_KEY, JSON.stringify({ id:id, pass:pass }));
    localStorage.setItem(SHORT_KEY, JSON.stringify({
      id:id,
      name:name,
      shift:String(user.shift || ''),
      admin:!!user.admin,
      auth_time:now,
      expire_time:now + SHORT_AUTH_MS
    }));
  }

  function safeLocalTarget(raw){
    var v = String(raw || '').trim();
    if (!v) return '';
    if (/^(javascript:|data:|blob:)/i.test(v)) return '';
    try {
      var u = new URL(v, location.href);
      if (u.origin !== location.origin) return '';
      if (/\/login\.html$/i.test(u.pathname)) return '';
      return u.pathname + u.search + u.hash;
    } catch (err) {
      return '';
    }
  }

  function returnTarget(){
    var sp = new URLSearchParams(location.search);
    var target = safeLocalTarget(sp.get('from'));
    if (!target) target = safeLocalTarget(sessionStorage.getItem('PI_RETURN_TO'));
    sessionStorage.removeItem('PI_RETURN_TO');
    if (!target) target = safeLocalTarget(document.referrer);
    return target;
  }

  function addCacheBust(url){
    var mark = url.indexOf('?') >= 0 ? '&' : '?';
    return url + mark + 'r=' + Date.now();
  }

  function loadLoginDraft(){
    try {
      var d = JSON.parse(localStorage.getItem(LOGIN_KEY) || '{}');
      if (d.id) idInput.value = normalizeId(d.id);
      if (d.pass) passInput.value = d.pass;
    } catch (err) {}
  }

function ping(){
  setGasStatus('檢查中...', 'warn');
  fetch(api_url + '?t=' + Date.now())
    .then(function(res){
      return res.text();
    })
    .then(function(text){
      if (String(text).trim() === 'ok') {
        setGasStatus('ok', 'ok');
      } else {
        setGasStatus('回應異常', 'bad');
      }
    })
    .catch(function(){
      setGasStatus('伺服器沒有回應', 'bad');
    });
}

  idInput.addEventListener('input', function(){ idInput.value = normalizeId(idInput.value).replace(/[^A-Z0-9]/g, '').slice(0,5); });
  passInput.addEventListener('input', function(){ passInput.value = String(passInput.value || '').replace(/[^A-Za-z0-9]/g, ''); });

  form.addEventListener('submit', function(ev){
    ev.preventDefault();
    var id = normalizeId(idInput.value);
    var pass = String(passInput.value || '').trim();
    if (!validId(id)) { setMsg('工號格式錯誤：需 5 碼英數。', 'bad'); return; }
    if (!validPass(pass)) { setMsg('密碼格式錯誤：僅接受英數且不得空白。', 'bad'); return; }
    submitBtn.disabled = true;
    setMsg('驗證中...', 'warn');
    postAction('auth', { id:id, pass:pass })
      .then(function(data){
        if (!data || data.status !== 'ok' || data.action !== 'auth') throw new Error((data && data.msg) || 'auth_failed');
        var user = toMap(data);
        saveDrafts(id, pass, user);
        var target = returnTarget();
        if (target) {
          setMsg('驗證成功，3 秒後返回原頁。', 'ok');
          setTimeout(function(){ location.replace(addCacheBust(target)); }, 3000);
        } else {
          setMsg('驗證成功，已建立通行草稿；未取得來源頁，不自動跳轉。', 'ok');
        }
      })
      .catch(function(err){
        setMsg('驗證失敗：' + (err && err.message ? err.message : 'unknown_error'), 'bad');
      })
      .finally(function(){ submitBtn.disabled = false; });
  });

  loadLoginDraft();
  ping();
})();
</script>
</body>
</html>

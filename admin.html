<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>人員管理</title>
  <script src="./config.js"></script>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#d8dee9;--ok:#087443;--bad:#b42318;--warn:#a15c07;--main:#1f5eff;}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;font-size:16px;line-height:1.45}
    .wrap{width:100%;max-width:620px;margin:0 auto;padding:14px 12px 28px}
    .status{padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:12px;font-size:14px;color:var(--muted)}
    .status.ok{border-color:#abefc6;color:var(--ok);background:#ecfdf3}.status.bad{border-color:#fecdca;color:var(--bad);background:#fef3f2}.status.warn{border-color:#fedf89;color:var(--warn);background:#fffaeb}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 20px rgba(16,24,40,.06);margin-bottom:12px}
    h1{font-size:22px;margin:0 0 6px} h2{font-size:18px;margin:0 0 12px}.sub{margin:0 0 14px;color:var(--muted);font-size:14px}
    label{display:block;margin-top:14px;font-weight:700}.hint{font-size:13px;color:var(--muted);margin-top:4px}
    input,select{width:100%;min-height:48px;margin-top:7px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:18px;background:#fff;outline:none}
    input:focus,select:focus{border-color:var(--main);box-shadow:0 0 0 3px rgba(31,94,255,.12)}
    button{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:14px;background:var(--main);color:white;font-size:17px;font-weight:800;letter-spacing:.04em}
    button:disabled{opacity:.55}.msg{min-height:22px;margin-top:14px;font-weight:700}.msg.ok{color:var(--ok)}.msg.bad{color:var(--bad)}.msg.warn{color:var(--warn)}
    .hide{display:none}.userbox{font-size:14px;color:var(--muted);padding:10px 12px;background:#f9fafb;border-radius:14px;border:1px solid var(--line)}
    .ver{margin-top:12px;text-align:center;color:#98a2b3;font-size:12px}
  </style>
</head>
<body>
  <main class="wrap">
    <div id="gasStatus" class="status warn">GAS 伺服狀態：檢查中...</div>
    <section class="card">
      <h1>人員管理</h1>
      <p class="sub">前端只檢查格式，帳密、admin 權限、新增或修改由 GAS 判斷。</p>
      <div id="gateMsg" class="msg warn">檢查登入草稿...</div>
      <div id="userBox" class="userbox hide"></div>
    </section>
    <section id="adminPanel" class="card hide">
      <h2>新增 / 修改人員</h2>
      <form id="saveForm" autocomplete="off">
        <label for="targetId">工號</label>
        <input id="targetId" name="id" inputmode="text" autocomplete="off" maxlength="5" placeholder="5碼英數" autocapitalize="characters">
        <div class="hint">英數 5 碼，自動轉大寫。此欄作為唯一識別。</div>
        <label for="targetPass">密碼</label>
        <input id="targetPass" name="pass" type="text" inputmode="text" autocomplete="off" placeholder="英數密碼">
        <div class="hint">僅接受英數。</div>
        <label for="targetName">中文名字</label>
        <input id="targetName" name="name" type="text" autocomplete="off" placeholder="至少 2 個字元">
        <label for="targetShift">人員班別</label>
        <select id="targetShift" name="shift">
          <option value="">請選擇</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
        <div class="hint">admin 權限不透過此表單寫入，請手動修改試算表。</div>
        <button id="saveBtn" type="submit">送出</button>
      </form>
      <div id="saveMsg" class="msg"></div>
    </section>
    <div class="ver">admin.html v0.1.4</div>
  </main>
<script>
(function(){
  'use strict';
  var VERSION = 'admin.html v0.1.4';
  var LOGIN_KEY = 'PI_LOGIN_DRAFT_V001';
  var SHORT_KEY = 'PI_SHORT_AUTH_V001';

  var gasStatus = document.getElementById('gasStatus');
  var gateMsg = document.getElementById('gateMsg');
  var userBox = document.getElementById('userBox');
  var adminPanel = document.getElementById('adminPanel');
  var saveForm = document.getElementById('saveForm');
  var saveBtn = document.getElementById('saveBtn');
  var saveMsg = document.getElementById('saveMsg');
  var targetId = document.getElementById('targetId');
  var targetPass = document.getElementById('targetPass');
  var targetName = document.getElementById('targetName');
  var targetShift = document.getElementById('targetShift');
  var loginDraft = null;

  function setGasStatus(text, type){
    gasStatus.textContent = 'GAS 伺服狀態：' + text;
    gasStatus.className = 'status ' + (type || 'warn');
  }

  function setGate(text, type){
    gateMsg.textContent = text || '';
    gateMsg.className = 'msg ' + (type || 'warn');
  }

  function setSave(text, type){
    saveMsg.textContent = text || '';
    saveMsg.className = 'msg' + (type ? ' ' + type : '');
  }

  function getApiUrl(){
    if (typeof api_url !== 'string' || !api_url) return '';
    return api_url;
  }

  function normalizeId(v){ return String(v || '').trim().toUpperCase(); }
  function validId(v){ return /^[A-Z0-9]{5}$/.test(v); }
  function validPass(v){ return /^[A-Za-z0-9]+$/.test(String(v || '')); }
  function validName(v){ return String(v || '').trim().length > 1; }
  function validShift(v){ return /^(A|B|C)$/.test(String(v || '')); }

  function toMap(data){
    var out = {};
    if (!data || !data.fields || !data.values) return out;
    for (var i = 0; i < data.fields.length; i++) out[data.fields[i]] = data.values[i];
    return out;
  }

  function postAction(action, payload){
    var url = getApiUrl();
    if (!url) return Promise.reject(new Error('api_url_not_set'));
    var params = new URLSearchParams();
    params.append('action', action);
    params.append('_t', String(Date.now()));
    if (payload) {
      Object.keys(payload).forEach(function(k){ params.append(k, payload[k] == null ? '' : String(payload[k])); });
    }
    return fetch(url, { method:'POST', body:params, credentials:'omit', cache:'no-store' })
      .then(function(res){ return res.text(); })
      .then(function(text){
        try { return JSON.parse(text); }
        catch (err) { throw new Error('json_parse_failed'); }
      });
  }

  function readJson(key){
    try { return JSON.parse(localStorage.getItem(key) || '{}'); }
    catch (err) { return {}; }
  }

  function redirectLogin(reason){
    setGate(reason + '，2 秒後跳轉登入頁。', 'warn');
    sessionStorage.setItem('PI_RETURN_TO', 'admin.html');
    setTimeout(function(){ location.replace('login.html?from=admin.html&r=' + Date.now()); }, 2000);
  }

  function checkDraft(){
    var ld = readJson(LOGIN_KEY);
    var sd = readJson(SHORT_KEY);
    var now = Date.now();
    if (!ld.id || !ld.pass) { redirectLogin('無帳密草稿'); return false; }
    if (!sd.id || !sd.expire_time || now > Number(sd.expire_time)) { redirectLogin('短暫通行草稿失效'); return false; }
    if (normalizeId(ld.id) !== normalizeId(sd.id)) { redirectLogin('草稿帳號不一致'); return false; }
    loginDraft = { id:normalizeId(ld.id), pass:String(ld.pass || '') };
    return true;
  }

  function ping(){
    setGasStatus('檢查中...', 'warn');
    postAction('ping', { page: VERSION })
      .then(function(data){
        if (data && data.status === 'ok' && data.action === 'ping') setGasStatus('正常', 'ok');
        else setGasStatus('回應格式異常', 'bad');
      })
      .catch(function(){ setGasStatus('GAS 伺服器沒有回應', 'bad'); });
  }

  function authAdmin(){
    setGate('驗證管理權限中...', 'warn');
    postAction('auth', { id:loginDraft.id, pass:loginDraft.pass })
      .then(function(data){
        if (!data || data.status !== 'ok' || data.action !== 'auth') throw new Error((data && data.msg) || 'auth_failed');
        var user = toMap(data);
        if (user.admin !== true && user.admin !== 'TRUE' && user.admin !== 'true') throw new Error('no_admin_permission');
        setGate('管理權限通過。', 'ok');
        userBox.classList.remove('hide');
        userBox.textContent = '目前登入：' + (user.id || loginDraft.id) + '｜' + (user.name || '') + '｜班別 ' + (user.shift || '');
        adminPanel.classList.remove('hide');
      })
      .catch(function(err){
        adminPanel.classList.add('hide');
        setGate('無法進入後台：' + (err && err.message ? err.message : 'unknown_error'), 'bad');
      });
  }

  targetId.addEventListener('input', function(){ targetId.value = normalizeId(targetId.value).replace(/[^A-Z0-9]/g, '').slice(0,5); });
  targetPass.addEventListener('input', function(){ targetPass.value = String(targetPass.value || '').replace(/[^A-Za-z0-9]/g, ''); });

  saveForm.addEventListener('submit', function(ev){
    ev.preventDefault();
    var id = normalizeId(targetId.value);
    var pass = String(targetPass.value || '').trim();
    var name = String(targetName.value || '').trim();
    var shift = String(targetShift.value || '');
    if (!validId(id)) { setSave('工號格式錯誤：需 5 碼英數。', 'bad'); return; }
    if (!validPass(pass)) { setSave('密碼格式錯誤：僅接受英數且不得空白。', 'bad'); return; }
    if (!validName(name)) { setSave('中文名字不得為空，且字元數需大於 1。', 'bad'); return; }
    if (!validShift(shift)) { setSave('請選擇人員班別。', 'bad'); return; }
    saveBtn.disabled = true;
    setSave('送出中...', 'warn');
    postAction('personnel_save', {
      admin_id: loginDraft.id,
      admin_pass: loginDraft.pass,
      id: id,
      pass: pass,
      name: name,
      shift: shift
    }).then(function(data){
      if (!data || data.status !== 'ok' || data.action !== 'personnel_save') throw new Error((data && data.msg) || 'save_failed');
      var row = toMap(data);
      setSave('完成：' + (row.mode || '') + '｜' + (row.id || id) + '｜' + (row.name || name), 'ok');
    }).catch(function(err){
      setSave('失敗：' + (err && err.message ? err.message : 'unknown_error'), 'bad');
    }).finally(function(){ saveBtn.disabled = false; });
  });

  ping();
  if (checkDraft()) authAdmin();
})();
</script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <script src="./config.js"></script>
  <title>人員管理 v0.1.2</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d0d7de;
      --main: #0f766e;
      --danger: #b91c1c;
      --warn: #b45309;
      --ok: #047857;
      --shadow: 0 8px 24px rgba(15, 23, 42, .10);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    body {
      padding: 14px;
      padding-bottom: calc(22px + env(safe-area-inset-bottom));
    }
    .wrap {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }
    .title {
      margin: 8px 0 4px;
      font-size: 25px;
      line-height: 1.25;
      font-weight: 850;
    }
    .ver {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .server {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-size: 14px;
      color: var(--muted);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
      flex: 0 0 auto;
    }
    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--danger); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    .hide { display: none !important; }
    label {
      display: block;
      font-weight: 800;
      margin: 12px 0 6px;
      font-size: 15px;
    }
    input, select, button {
      width: 100%;
      min-height: 50px;
      font-size: 18px;
      border-radius: 14px;
      font-family: inherit;
    }
    input, select {
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .15);
    }
    button {
      border: 0;
      padding: 12px;
      font-weight: 850;
      background: var(--main);
      color: #fff;
      margin-top: 12px;
      cursor: pointer;
      touch-action: manipulation;
    }
    button.ghost {
      color: var(--main);
      border: 1px solid var(--main);
      background: #fff;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .msg {
      min-height: 24px;
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--danger); }
    .msg.warn { color: var(--warn); }
    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      margin-top: 10px;
    }
    .adminInfo {
      padding: 10px 12px;
      border-radius: 14px;
      background: #ecfdf5;
      color: #065f46;
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 12px;
    }
    iframe {
      width: 1px;
      height: 1px;
      position: absolute;
      left: -9999px;
      top: -9999px;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">人員管理</h1>
    <div class="ver">版本 v0.1.2｜手機瀏覽器相容版｜POST-only</div>

    <div class="server" aria-live="polite">
      <span id="gasDot" class="dot"></span>
      <span id="gasText">GAS 伺服狀態：檢查中...</span>
    </div>

    <section id="gateCard" class="card">
      <div id="gateMsg" class="msg warn">正在檢查本機草稿...</div>
    </section>

    <section id="manageCard" class="card hide">
      <div id="adminInfo" class="adminInfo"></div>

      <label for="targetId">工號</label>
      <input id="targetId" type="text" inputmode="latin" autocomplete="off" autocapitalize="characters" maxlength="5" placeholder="5碼英數，例如 A1234">

      <label for="targetPass">密碼</label>
      <input id="targetPass" type="text" inputmode="latin" autocomplete="off" autocapitalize="none" maxlength="32" placeholder="英數">

      <label for="targetName">中文名字</label>
      <input id="targetName" type="text" autocomplete="off" placeholder="不得空白，字元需大於 1">

      <label for="targetShift">預設班別</label>
      <select id="targetShift">
        <option value="">請選擇</option>
        <option value="A">A 班</option>
        <option value="B">B 班</option>
        <option value="C">C 班</option>
      </select>

      <button id="saveBtn" type="button">新增 / 修改人員</button>
      <button id="clearBtn" class="ghost" type="button">清空輸入</button>
      <button id="loginBtn" class="ghost" type="button">重新登入</button>

      <div id="mainMsg" class="msg"></div>
      <div class="note">前端只檢查欄位格式是否可送出；帳密、admin 權限、人員新增或覆寫均由 GAS 判斷。admin 欄只讀不寫。</div>
    </section>
  </div>

  <iframe id="statusFrame" name="statusFrame" title="statusFrame"></iframe>
  <iframe id="postFrame" name="postFrame" title="postFrame"></iframe>

  <script>
    "use strict";

    const APP_VERSION = "v0.1.2";
    const LOGIN_FORM_URL = "login.html";
    const STORAGE_LOGIN = "PI_LOGIN_DRAFT_V001";
    const STORAGE_SHORT_AUTH = "PI_SHORT_AUTH_V001";

    const $ = (id) => document.getElementById(id);
    let pendingAction = "";
    let statusTimer = 0;
    let adminDraft = null;

    document.addEventListener("DOMContentLoaded", () => {
      $("targetId").addEventListener("input", () => {
        $("targetId").value = normalizeId($("targetId").value);
      });
      $("targetPass").addEventListener("input", () => {
        $("targetPass").value = normalizePass($("targetPass").value);
      });
      $("saveBtn").addEventListener("click", saveUser);
      $("clearBtn").addEventListener("click", clearEdit);
      $("loginBtn").addEventListener("click", goLoginNow);

      checkGasStatus();
      checkLocalGate();
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.action === "server_status") {
        handleServerStatus(data);
        return;
      }

      if (data.action === pendingAction) {
        handleGasMessage(data);
      }
    });

    function getApiUrl() {
      return String(window.api_url || "").trim();
    }

    function isApiUrlReady() {
      return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(getApiUrl());
    }

    function normalizeId(value) {
      return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 5);
    }

    function normalizePass(value) {
      return String(value || "").replace(/[^A-Za-z0-9]/g, "").slice(0, 32);
    }

    function normalizeShift(value) {
      return String(value || "").toUpperCase().trim();
    }

    function validId(value) {
      return /^[A-Z0-9]{5}$/.test(value);
    }

    function validPass(value) {
      return /^[A-Za-z0-9]+$/.test(value);
    }

    function validName(value) {
      return String(value || "").trim().length > 1;
    }

    function validShift(value) {
      return /^(A|B|C)$/.test(value);
    }

    function setGateMsg(text, type) {
      const el = $("gateMsg");
      el.textContent = text || "";
      el.className = "msg " + (type || "");
    }

    function setMainMsg(text, type) {
      const el = $("mainMsg");
      el.textContent = text || "";
      el.className = "msg " + (type || "");
    }

    function setBusy(isBusy) {
      $("saveBtn").disabled = isBusy;
      $("clearBtn").disabled = isBusy;
      $("loginBtn").disabled = isBusy;
    }

    function setGasStatus(text, type) {
      $("gasText").textContent = "GAS 伺服狀態：" + text;
      $("gasDot").className = "dot " + (type || "");
    }

    function checkGasStatus() {
      if (!isApiUrlReady()) {
        setGasStatus("config.js 的 api_url 未設定", "err");
        return;
      }

      setGasStatus("檢查中...", "");
      const api = getApiUrl();
      const sep = api.indexOf("?") >= 0 ? "&" : "?";
      $("statusFrame").src = api + sep + "action=server_status&t=" + encodeURIComponent(Date.now());

      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => {
        setGasStatus("無回應", "err");
      }, 7000);
    }

    function handleServerStatus(data) {
      clearTimeout(statusTimer);
      if (data.status === "ok") {
        setGasStatus("正常", "ok");
      } else {
        setGasStatus(data.msg || "異常", "err");
      }
    }

    function checkLocalGate() {
      const loginDraft = readJson(STORAGE_LOGIN);
      const shortAuth = readJson(STORAGE_SHORT_AUTH);
      const now = Date.now();

      if (!loginDraft || !validId(normalizeId(loginDraft.id)) || !validPass(String(loginDraft.pass || ""))) {
        localStorage.removeItem(STORAGE_SHORT_AUTH);
        redirectLoginDelay("無帳密草稿，2 秒後轉登入。");
        return;
      }

      if (!shortAuth || !validId(normalizeId(shortAuth.id)) || Number(shortAuth.expire_at || 0) <= now) {
        localStorage.removeItem(STORAGE_SHORT_AUTH);
        redirectLoginDelay("短暫通行草稿失效，2 秒後轉登入。");
        return;
      }

      if (normalizeId(shortAuth.id) !== normalizeId(loginDraft.id)) {
        localStorage.removeItem(STORAGE_SHORT_AUTH);
        redirectLoginDelay("草稿資料不一致，2 秒後轉登入。");
        return;
      }

      if (!isApiUrlReady()) {
        setGateMsg("config.js 的 api_url 尚未設定或格式錯誤。", "err");
        return;
      }

      adminDraft = {
        id: normalizeId(loginDraft.id),
        pass: normalizePass(loginDraft.pass)
      };

      pendingAction = "auth";
      setGateMsg("草稿有效，正在向 GAS 確認後台管理權...", "warn");
      postToGas({
        action: "auth",
        id: adminDraft.id,
        pass: adminDraft.pass,
        require_admin: "TRUE"
      });
    }

    function redirectLoginDelay(text) {
      setGateMsg(text, "warn");
      setTimeout(goLoginNow, 2000);
    }

    function goLoginNow() {
      const back = "admin.html";
      window.location.href = LOGIN_FORM_URL + "?back=" + encodeURIComponent(back);
    }

    function handleGasMessage(data) {
      const action = pendingAction;
      pendingAction = "";
      setBusy(false);

      if (action === "auth") {
        handleAdminAuth(data);
        return;
      }

      if (action === "personnel_save") {
        handleSaveResult(data);
      }
    }

    function handleAdminAuth(data) {
      if (data.status === "ok") {
        $("gateCard").classList.add("hide");
        $("manageCard").classList.remove("hide");
        $("adminInfo").textContent = "目前管理者：" + normalizeId(data.id || adminDraft.id) + "　" + String(data.name || "");
        return;
      }

      localStorage.removeItem(STORAGE_SHORT_AUTH);
      setGateMsg("後台驗證失敗：" + mapMsg(data.msg) + "\n2 秒後轉登入。", "err");
      setTimeout(goLoginNow, 2000);
    }

    function saveUser() {
      if (!adminDraft) {
        redirectLoginDelay("管理者草稿不存在，2 秒後轉登入。");
        return;
      }

      const targetId = normalizeId($("targetId").value);
      const targetPass = normalizePass($("targetPass").value);
      const targetName = String($("targetName").value || "").trim();
      const targetShift = normalizeShift($("targetShift").value);

      $("targetId").value = targetId;
      $("targetPass").value = targetPass;
      $("targetName").value = targetName;
      $("targetShift").value = targetShift;

      if (!validId(targetId)) {
        setMainMsg("工號格式錯誤：需 5 碼英數。", "err");
        return;
      }
      if (!validPass(targetPass)) {
        setMainMsg("密碼格式錯誤：只允許英數，且不可空白。", "err");
        return;
      }
      if (!validName(targetName)) {
        setMainMsg("中文名字不得空白，且字元需大於 1。", "err");
        return;
      }
      if (!validShift(targetShift)) {
        setMainMsg("預設班別需選擇 A、B、C。", "err");
        return;
      }
      if (!isApiUrlReady()) {
        setMainMsg("config.js 的 api_url 尚未設定或格式錯誤。", "err");
        return;
      }

      pendingAction = "personnel_save";
      setBusy(true);
      setMainMsg("送出中...", "warn");
      postToGas({
        action: "personnel_save",
        id: adminDraft.id,
        pass: adminDraft.pass,
        target_id: targetId,
        target_pass: targetPass,
        target_name: targetName,
        target_shift: targetShift
      });
    }

    function handleSaveResult(data) {
      if (data.status === "ok") {
        setMainMsg("已完成：" + (data.mode === "insert" ? "新增" : "修改") + "「" + normalizeId(data.target_id || "") + "」。", "ok");
        clearEdit(false);
        return;
      }

      setMainMsg("儲存失敗：" + mapMsg(data.msg), "err");
    }

    function postToGas(params) {
      const api = getApiUrl();
      const body = new URLSearchParams();
      Object.keys(params).forEach((key) => body.set(key, params[key]));

      const form = document.createElement("form");
      form.method = "post";
      form.action = api;
      form.target = "postFrame";
      form.style.display = "none";

      body.forEach((value, key) => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = value;
        form.appendChild(input);
      });

      document.body.appendChild(form);
      form.submit();
      setTimeout(() => {
        try { document.body.removeChild(form); } catch (err) {}
      }, 1000);
    }

    function clearEdit(showMessage) {
      $("targetId").value = "";
      $("targetPass").value = "";
      $("targetName").value = "";
      $("targetShift").value = "";
      if (showMessage !== false) setMainMsg("已清空輸入。", "ok");
    }

    function readJson(key) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        return null;
      }
    }

    function mapMsg(msg) {
      const table = {
        bad_action: "後端路由錯誤。",
        invalid_id: "工號格式錯誤。",
        invalid_pass: "密碼格式錯誤。",
        invalid_name: "中文名字格式錯誤。",
        invalid_shift: "預設班別格式錯誤。",
        auth_failed: "帳號或密碼錯誤。",
        admin_required: "無後台管理權或權限已變更。",
        lock_timeout: "系統忙碌，請稍後再試。",
        config_missing: "GAS 尚未設定試算表 ID。",
        user_sheet_not_found: "找不到人員主檔 Sheet。",
        server_error: "伺服器錯誤。"
      };
      return table[msg] || msg || "未知錯誤。";
    }
  </script>
</body>
</html>

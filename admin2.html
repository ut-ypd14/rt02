<!doctype html>
<html lang="zh-Hant">
<head>
  <script src="./config.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>人員管理</title>
  <style>
    :root{
      --bg:#f4f7fb;--card:#fff;--ink:#152033;--muted:#667085;--line:#d9e2ef;
      --brand:#255fbc;--brand2:#174c99;--ok:#19a15f;--warn:#f59e0b;--bad:#e5484d;
      --soft:#eef4ff;--soft-red:#fff5f5;--admin-red:#b42318;--disabled-bg:#e5e7eb;--disabled-text:#8a94a6;
      --shadow:0 10px 28px rgba(15,23,42,.10);--radius:18px;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:linear-gradient(180deg,#eef5ff 0%,var(--bg) 42%,#f9fbff 100%);color:var(--ink);min-height:100vh;-webkit-text-size-adjust:100%;}
    input,select,button{font:inherit;} input,select,textarea{font-size:16px;}
    .wrap{width:min(760px,calc(100% - 20px));margin:0 auto;padding:12px 0 26px;}
    .hide{display:none!important;}
    .top-status-card{display:grid;grid-template-columns:minmax(0,1fr) 42px 30px;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:10px 12px;margin-bottom:12px;position:sticky;top:8px;z-index:20;}
    .user-box{min-width:0;font-weight:950;color:#344054;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;font-size:14px;}
    .home-jump-btn{width:42px;height:40px;border-radius:14px;border:1px solid #c8d8f2;background:#eef4ff;color:#1d4ed8;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-size:23px;font-weight:950;line-height:1;box-shadow:0 6px 14px rgba(37,95,188,.12);}
    .home-jump-btn:active{transform:scale(.96);}
    .gas-lamp-wrap{display:flex;align-items:center;justify-content:center;width:30px;height:30px;}
    .gas-lamp{width:22px;height:22px;border-radius:50%;background:#98a2b3;box-shadow:0 0 0 4px rgba(37,95,188,.08),0 0 14px rgba(37,95,188,.16);}
    .gas-lamp.checking{background:#98a2b3;} .gas-lamp.ok{background:var(--ok);} .gas-lamp.warn{background:var(--warn);} .gas-lamp.bad{background:var(--bad);}
    .status{border-radius:14px;padding:10px 12px;margin-bottom:10px;font-weight:850;border:1px solid var(--line);background:#fff;box-shadow:0 4px 14px rgba(15,23,42,.05);}
    .status.ok{background:#ecfdf3;color:#067647;border-color:#abefc6;} .status.warn{background:#fffaeb;color:#92400e;border-color:#fedf89;} .status.bad{background:#fef3f2;color:#b42318;border-color:#fecdca;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-top:12px;}
    .main-head{display:grid;grid-template-columns:minmax(0,1fr) 42px;align-items:center;gap:10px;margin-bottom:10px;}
    h1{margin:0;font-size:clamp(22px,5vw,32px);line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .icon-btn{width:42px;height:40px;border-radius:14px;border:1px solid #c8d8f2;background:#eef4ff;color:#174c99;display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:950;cursor:pointer;padding:0;line-height:1;}
    .icon-btn.loading{animation:spin .9s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
    .filter-line{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;margin:8px 0;}
    .filter-group{display:flex;gap:6px;flex-wrap:nowrap;min-width:0;overflow:hidden;}
    .filter-btn{min-width:45px;height:36px;border-radius:999px;padding:7px 9px;border:1px solid #c8d8f2;background:#fff;color:#174c99;font-weight:950;cursor:pointer;white-space:nowrap;flex:0 0 auto;}
    .filter-btn.active{background:#174c99;color:#fff;border-color:#174c99;}
    .list-count-text{color:var(--muted);font-size:13px;font-weight:950;white-space:nowrap;text-align:right;}
    .person-head{display:grid;grid-template-columns:1.05fr 1.35fr .55fr .7fr;gap:6px;color:var(--muted);font-size:12px;font-weight:950;padding:0 8px 4px 12px;white-space:nowrap;}
    .person-list{display:flex;flex-direction:column;gap:7px;max-height:min(36vh,360px);overflow-y:auto;overscroll-behavior:contain;padding-right:4px;border-radius:14px;margin-bottom:12px;}
    .person-list::-webkit-scrollbar{width:6px;} .person-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px;} .person-list::-webkit-scrollbar-track{background:transparent;}
    .person-row{width:100%;border:1px solid var(--line);border-left:4px solid transparent;border-radius:13px;background:#fff;display:grid;grid-template-columns:1.05fr 1.35fr .55fr .7fr;gap:6px;align-items:center;min-height:42px;padding:8px;text-align:left;cursor:pointer;color:var(--ink);}
    .person-row.is-admin{background:var(--soft-red);border-left-color:#fca5a5;} .person-row.is-admin .cell{color:var(--admin-red);font-weight:950;}
    .person-row.is-disabled{background:var(--disabled-bg);color:var(--disabled-text);opacity:.94;} .person-row.is-disabled .cell{color:var(--disabled-text);} .person-row.is-admin.is-disabled{border-left-color:#fca5a5;} .person-row:active{transform:scale(.992);}
    .cell{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:900;font-size:13px;line-height:1.15;}
    .cell.status-text{text-align:center;border-radius:999px;padding:4px 5px;background:#ecfdf3;color:#067647;font-size:12px;} .person-row.is-disabled .status-text{background:#cbd5e1;color:#64748b;}
    .mode-row{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:8px;align-items:stretch;margin:12px 0 10px;scroll-margin-top:12px;}
    .mode-badge,#clearFormBtn{min-height:42px;display:flex;align-items:center;}
    .mode-badge{justify-content:flex-start;border:1px solid #c8d8f2;background:#eef4ff;color:#174c99;border-radius:14px;padding:8px 10px;font-weight:950;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
    .btn{border:0;border-radius:14px;padding:10px 12px;min-height:42px;font-weight:950;cursor:pointer;transition:transform .12s ease,opacity .12s ease,box-shadow .12s ease;white-space:nowrap;}
    .btn:active{transform:scale(.98);} .btn:disabled{opacity:.52;cursor:not-allowed;transform:none;}
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 8px 18px rgba(37,95,188,.24);} .btn-soft{background:#eef4ff;color:var(--brand2);border:1px solid #c8d8f2;} .btn-danger{background:#fff1f2;color:#be123c;border:1px solid #fecdd3;} .btn-ok{background:#ecfdf3;color:#067647;border:1px solid #abefc6;}
    .msg{min-height:22px;margin:6px 0 10px;font-size:14px;font-weight:950;color:var(--muted);line-height:1.35;} .msg.ok{color:#067647;} .msg.bad{color:#b42318;} .msg.warn{color:#92400e;}
    .form-line{display:grid;grid-template-columns:52px minmax(0,1fr);align-items:center;gap:8px;margin-top:9px;}
    .form-line label{margin:0;font-size:14px;font-weight:950;color:#344054;white-space:nowrap;}
    input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:10px 11px;outline:none;background:#fff;min-height:44px;font-size:16px;}
    input:focus,select:focus{border-color:#6aa1ff;box-shadow:0 0 0 4px rgba(37,95,188,.10);}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;} .actions.single{grid-template-columns:1fr;}
    .small-note{color:var(--muted);font-size:12px;line-height:1.5;margin-top:8px;}
    @media(max-width:420px){.wrap{width:min(100% - 12px,760px);} .top-status-card{grid-template-columns:minmax(0,1fr) 40px 28px;gap:8px;padding:9px 10px;} .user-box{font-size:13px;} .home-jump-btn,.icon-btn{width:40px;height:38px;font-size:21px;} .gas-lamp{width:20px;height:20px;} .card{padding:12px;} .filter-btn{min-width:39px;height:34px;padding:6px 7px;font-size:13px;} .list-count-text{font-size:12px;} .person-head,.person-row{grid-template-columns:1.05fr 1.25fr .48fr .62fr;gap:4px;} .person-head{padding-left:10px;padding-right:6px;} .person-row{min-height:40px;padding:7px 6px;} .cell{font-size:12px;} .cell.status-text{font-size:11px;padding:3px 4px;} .mode-row{grid-template-columns:minmax(0,1fr) 84px;} .mode-badge{font-size:12px;padding:8px 9px;} .form-line{grid-template-columns:46px minmax(0,1fr);gap:7px;} .form-line label{font-size:13px;} .btn{padding:9px 10px;}}
  </style>
</head>
<body>
  <main class="wrap">
    <div id="topStatusBar" class="top-status-card hide">
      <div id="userBox" class="user-box">目前管理者：----</div>
      <a class="home-jump-btn" href="./index.html" title="返回首頁" aria-label="返回首頁">⌂</a>
      <div class="gas-lamp-wrap" id="gasStatusWrap" title="GAS 伺服狀態" aria-label="GAS 伺服狀態"><span class="gas-lamp checking" id="gasLamp"></span></div>
    </div>
    <div id="gateStatus" class="status warn">管理權限：檢查中...</div>
    <section id="mainPanel" class="card hide">
      <div class="main-head"><h1>人員管理</h1><button type="button" class="icon-btn" id="loadListBtn" title="載入名單" aria-label="載入名單">↻</button></div>
      <div class="filter-line"><div id="filterGroup" class="filter-group"><button type="button" class="filter-btn active" data-filter="ALL">ALL</button><button type="button" class="filter-btn" data-filter="A">A</button><button type="button" class="filter-btn" data-filter="B">B</button><button type="button" class="filter-btn" data-filter="C">C</button></div><div id="listCountText" class="list-count-text">尚未載入</div></div>
      <div id="personHead" class="person-head hide"><div>ID</div><div>NAME</div><div>班別</div><div>狀態</div></div>
      <div id="personList" class="person-list hide"></div>
      <div class="mode-row" id="formSection"><div class="mode-badge" id="modeBadge">目前狀態：手動輸入</div><button type="button" class="btn btn-soft" id="clearFormBtn">清空欄位</button></div>
      <form id="saveForm" autocomplete="off">
        <div id="actionMsg" class="msg"></div>
        <div class="form-line"><label for="idInput">ID</label><input id="idInput" name="id" type="text" maxlength="5" inputmode="text" autocomplete="off" placeholder="5碼英數"></div>
        <div class="form-line"><label for="passInput">密碼</label><input id="passInput" name="pass" type="password" autocomplete="new-password" placeholder="英數密碼"></div>
        <div class="form-line"><label for="nameInput">姓名</label><input id="nameInput" name="name" type="text" autocomplete="off" placeholder="姓名"></div>
        <div class="form-line"><label for="shiftInput">班別</label><select id="shiftInput" name="shift"><option value="">請選擇</option><option value="A">A</option><option value="B">B</option><option value="C">C</option></select></div>
        <div class="actions single" id="actionButtons"><button type="submit" class="btn btn-primary" id="saveBtn">儲存</button><button type="button" class="btn btn-danger hide" id="disableBtn">停用</button><button type="button" class="btn btn-ok hide" id="enableBtn">啟用</button></div>
      </form>
    </section>
    <footer class="small-note" style="text-align:center;padding:16px 0 4px;">admin4.html v0.1.0</footer>
  </main>
<script>
const VERSION='admin4.html v0.1.0';
const LOGIN_DRAFT_KEY='PI_LOGIN_DRAFT_V001', SHORT_AUTH_KEY='PI_SHORT_AUTH_V001';
const AUTH_EXPIRE_MS=2*60*60*1000, POST_TIMEOUT_MS=15000, PING_TIMEOUT_MS=6000, MSG_OK_MS=8000, MSG_BAD_MS=10000;
let authState=null, loginDraft=null, personnelRows=[], listLoaded=false, currentFilter='ALL', selectedRow=null, actionMsgTimer=null;
const el={topStatusBar:document.getElementById('topStatusBar'),userBox:document.getElementById('userBox'),gasLamp:document.getElementById('gasLamp'),gasStatusWrap:document.getElementById('gasStatusWrap'),gateStatus:document.getElementById('gateStatus'),mainPanel:document.getElementById('mainPanel'),loadListBtn:document.getElementById('loadListBtn'),filterGroup:document.getElementById('filterGroup'),listCountText:document.getElementById('listCountText'),personHead:document.getElementById('personHead'),personList:document.getElementById('personList'),formSection:document.getElementById('formSection'),modeBadge:document.getElementById('modeBadge'),clearFormBtn:document.getElementById('clearFormBtn'),saveForm:document.getElementById('saveForm'),idInput:document.getElementById('idInput'),passInput:document.getElementById('passInput'),nameInput:document.getElementById('nameInput'),shiftInput:document.getElementById('shiftInput'),actionMsg:document.getElementById('actionMsg'),actionButtons:document.getElementById('actionButtons'),saveBtn:document.getElementById('saveBtn'),disableBtn:document.getElementById('disableBtn'),enableBtn:document.getElementById('enableBtn')};
document.addEventListener('DOMContentLoaded',init);
async function init(){bindEvents();await ping();const ok=await prepareAdminGate();if(!ok){setGate('管理權限：驗證失敗，1 秒後返回首頁。','bad');setTimeout(function(){location.href='./index.html';},1000);return;}showAdmin();}
function getApiUrl(){return typeof window.api_url==='string'&&window.api_url.trim()?window.api_url.trim():'';}
function nowValue(){return Number(window.CFG_time||Date.now());}
function bindEvents(){el.idInput.addEventListener('input',function(){el.idInput.value=normalizeId(el.idInput.value);});el.passInput.addEventListener('input',function(){el.passInput.value=String(el.passInput.value||'').replace(/[^A-Za-z0-9]/g,'');});el.nameInput.addEventListener('input',function(){el.nameInput.value=String(el.nameInput.value||'').trimStart();});el.clearFormBtn.addEventListener('click',clearFormForManual);el.saveForm.addEventListener('submit',function(evt){evt.preventDefault();savePersonnel('');});el.disableBtn.addEventListener('click',function(){savePersonnel('FALSE');});el.enableBtn.addEventListener('click',function(){savePersonnel('TRUE');});el.loadListBtn.addEventListener('click',function(){loadPersonnelList(true);});el.filterGroup.addEventListener('click',function(evt){const btn=evt.target.closest('[data-filter]');if(!btn)return;currentFilter=btn.dataset.filter||'ALL';Array.from(el.filterGroup.querySelectorAll('.filter-btn')).forEach(function(node){node.classList.toggle('active',node===btn);});renderPersonnelList();});}
async function ping(){if(!getApiUrl()){setGas('GAS 伺服狀態：找不到 api_url','bad');return;}setGas('GAS 伺服狀態：檢查中','checking');const controller=new AbortController();const timer=setTimeout(function(){controller.abort();},PING_TIMEOUT_MS);try{const res=await fetch(getApiUrl()+'?t='+nowValue(),{method:'GET',cache:'no-store',signal:controller.signal});clearTimeout(timer);if(res&&res.status===200){setGas('GAS 伺服狀態：ok','ok');}else{setGas('GAS 伺服狀態：回應異常','bad');}}catch(err){clearTimeout(timer);setGas('GAS 伺服狀態：伺服器沒有回應','bad');}}
async function prepareAdminGate(){loginDraft=readJson(LOGIN_DRAFT_KEY);const shortAuth=readJson(SHORT_AUTH_KEY);if(!loginDraft||!loginDraft.id||!loginDraft.pass){setGate('管理權限：找不到帳密草稿。','bad');return false;}if(isShortAuthValid(shortAuth,loginDraft.id)&&isAdminValue(shortAuth.admin)){authState=shortAuth;setGate('管理權限：ok','ok');return true;}setGate('管理權限：通行證失效，原地驗證中...','warn');const renewed=await renewAuth(loginDraft.id,loginDraft.pass);if(renewed&&isAdminValue(renewed.admin)){authState=renewed;setGate('管理權限：ok','ok');return true;}return false;}
function isShortAuthValid(shortAuth,draftId){if(!shortAuth||!shortAuth.id)return false;const a=normalizeId(shortAuth.id),b=normalizeId(draftId);if(!a||!b||a!==b)return false;const expireTime=Number(shortAuth.expire_time||0);return Number.isFinite(expireTime)&&nowValue()<expireTime;}
async function renewAuth(id,pass){const params=new URLSearchParams();params.set('action','auth');params.set('id',normalizeId(id));params.set('pass',String(pass||'').trim());try{const data=await postWithTimeout(params,POST_TIMEOUT_MS);if(!data||data.status!=='ok')return null;const user=fieldsValuesToObject(data);const now=nowValue();const renewed={id:normalizeId(user.id||id),name:String(user.name||''),shift:normalizeShift(user.shift||''),admin:isAdminValue(user.admin),auth_time:now,expire_time:now+AUTH_EXPIRE_MS};writeJson(SHORT_AUTH_KEY,renewed);return renewed;}catch(err){return null;}}
function showAdmin(){el.topStatusBar.classList.remove('hide');el.mainPanel.classList.remove('hide');el.gateStatus.classList.add('hide');el.userBox.textContent='目前管理者：'+(authState.id||'----')+'　'+(authState.name||'');clearFormForManual();}
function clearFormForManual(){selectedRow=null;el.idInput.value='';el.passInput.value='';el.nameInput.value='';el.shiftInput.value='';setMode('目前狀態：手動輸入');setActionMsg('','');updateModeButtons();}
function setMode(text){el.modeBadge.textContent=text;}
function fillFormFromRow(row){selectedRow=row||null;el.idInput.value=row.id||'';el.passInput.value=row.pass||'';el.nameInput.value=row.name||'';el.shiftInput.value=row.shift||'';setMode(row.active?'目前狀態：修改 '+(row.id||''):'目前狀態：修改 '+(row.id||'')+'（停用）');setActionMsg('已帶入人員資料。','ok');updateModeButtons();scrollToFormAfterFill();}
function scrollToFormAfterFill(){setTimeout(function(){el.formSection.scrollIntoView({behavior:'smooth',block:'start'});},80);}
function updateModeButtons(){const selected=!!selectedRow;const active=selectedRow&&selectedRow.active===true;el.disableBtn.classList.toggle('hide',!selected||!active);el.enableBtn.classList.toggle('hide',!selected||active);el.actionButtons.classList.toggle('single',!selected);}
async function savePersonnel(activeValue){setActionMsg('','');const id=normalizeId(el.idInput.value),pass=String(el.passInput.value||'').trim(),name=String(el.nameInput.value||'').trim(),shift=normalizeShift(el.shiftInput.value);if(!/^[A-Z0-9]{5}$/.test(id)){setActionMsg('ID 必須為 5 碼英數。','bad');return;}if(activeValue===''){if(!/^[A-Za-z0-9]+$/.test(pass)){setActionMsg('密碼只能使用英數，且不可空白。','bad');return;}if(name.length<=1){setActionMsg('姓名長度不足。','bad');return;}if(!/^[ABC]$/.test(shift)){setActionMsg('請選擇班別 A/B/C。','bad');return;}}const params=new URLSearchParams();params.set('action','personnel_save');params.set('admin_id',normalizeId(loginDraft.id));params.set('admin_pass',String(loginDraft.pass||''));params.set('id',id);if(activeValue!=='FALSE'){params.set('pass',pass);params.set('name',name);params.set('shift',shift);}if(activeValue){params.set('active',activeValue);}setActionMsg(activeValue==='FALSE'?'停用中...':activeValue==='TRUE'?'啟用中...':'儲存中...','warn');try{const data=await postWithTimeout(params,POST_TIMEOUT_MS);if(data&&data.status==='ok'){setActionMsg('操作完成。','ok');if(listLoaded){await loadPersonnelList(false);}if(activeValue==='FALSE'){clearFormForManual();}return;}setActionMsg('操作失敗：'+(data&&data.msg?data.msg:'unknown_error'),'bad');}catch(err){setActionMsg('操作失敗：'+formatError(err),'bad');}}
async function loadPersonnelList(showLoading){if(showLoading){el.loadListBtn.classList.add('loading');el.listCountText.textContent='讀取中...';}const params=new URLSearchParams();params.set('action','personnel_list');try{const data=await postWithTimeout(params,POST_TIMEOUT_MS);if(!data||data.status!=='ok'){el.listCountText.textContent='讀取失敗';return;}personnelRows=normalizePersonnelRows(data);listLoaded=true;renderPersonnelList();}catch(err){el.listCountText.textContent='讀取失敗';}finally{el.loadListBtn.classList.remove('loading');}}
function normalizePersonnelRows(data){if(!data||!Array.isArray(data.fields)||!Array.isArray(data.values))return [];return data.values.map(function(row){const obj={};data.fields.forEach(function(field,index){obj[field]=row[index];});return {id:normalizeId(obj.id||''),pass:String(obj.pass||''),name:String(obj.name||''),shift:normalizeShift(obj.shift||''),active:parseActiveValue(obj.active),admin:isAdminValue(obj.admin)};}).filter(function(row){return row.id;}).sort(function(a,b){return String(a.shift||'').localeCompare(String(b.shift||''))||String(a.id||'').localeCompare(String(b.id||''));});}
function renderPersonnelList(){const rows=personnelRows.filter(function(row){return currentFilter==='ALL'||row.shift===currentFilter;});el.personList.innerHTML='';el.listCountText.textContent=listLoaded?'共 '+rows.length+' 筆':'尚未載入';if(!listLoaded||!rows.length){el.personHead.classList.add('hide');el.personList.classList.add('hide');return;}el.personHead.classList.remove('hide');el.personList.classList.remove('hide');rows.forEach(function(row){const btn=document.createElement('button');btn.type='button';btn.className='person-row'+(row.admin?' is-admin':'')+(!row.active?' is-disabled':'');btn.innerHTML=['<div class="cell">'+escapeHtml(row.id)+'</div>','<div class="cell">'+escapeHtml(row.name)+'</div>','<div class="cell">'+escapeHtml(row.shift||'-')+'</div>','<div class="cell status-text">'+(row.active?'啟用':'停用')+'</div>'].join('');btn.addEventListener('click',function(){fillFormFromRow(row);});el.personList.appendChild(btn);});}
async function postWithTimeout(params,timeoutMs){const controller=new AbortController();const timer=setTimeout(function(){controller.abort();},timeoutMs);try{const res=await fetch(getApiUrl(),{method:'POST',body:params,signal:controller.signal});const text=await res.text();try{return JSON.parse(text);}catch(err){throw new Error('GAS 回傳不是 JSON');}}finally{clearTimeout(timer);}}
function fieldsValuesToObject(data){const out={};if(!data||!Array.isArray(data.fields)||!Array.isArray(data.values))return out;data.fields.forEach(function(key,index){out[key]=data.values[index];});return out;}
function parseActiveValue(value){if(value===false)return false;const v=String(value==null?'':value).trim().toUpperCase();if(v==='FALSE'||v==='F'||v==='0')return false;return true;}
function isAdminValue(value){if(value===true)return true;const v=String(value==null?'':value).trim().toUpperCase();return v==='TRUE'||v==='T'||v==='1';}
function normalizeId(value){return String(value||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,5);}
function normalizeShift(value){const v=String(value||'').trim().toUpperCase();return /^[ABC]$/.test(v)?v:'';}
function setGas(text,type){el.gasLamp.className='gas-lamp '+(type||'checking');el.gasStatusWrap.title=text;el.gasStatusWrap.setAttribute('aria-label',text);}
function setGate(text,type){el.gateStatus.textContent=text;el.gateStatus.className='status '+(type||'warn');}
function setActionMsg(text,type){clearTimeout(actionMsgTimer);el.actionMsg.textContent=text||'';el.actionMsg.className='msg '+(type||'');if(!text)return;const ms=type==='bad'?MSG_BAD_MS:MSG_OK_MS;actionMsgTimer=setTimeout(function(){el.actionMsg.textContent='';el.actionMsg.className='msg';},ms);}
function readJson(key){try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):null;}catch(err){return null;}}
function writeJson(key,value){localStorage.setItem(key,JSON.stringify(value));}
function escapeHtml(value){return String(value==null?'':value).replace(/[&<>"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];});}
function formatError(err){if(!err)return 'unknown_error';if(err.name==='AbortError')return 'timeout';return String(err.message||err);}
</script>

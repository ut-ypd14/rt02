<!doctype html>
<html lang="zh-Hant">
<head>
  <script src="./config.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>人員管理</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --ink:#152033;
      --muted:#667085;
      --line:#d9e2ef;
      --brand:#255fbc;
      --brand2:#174c99;
      --ok:#19a15f;
      --warn:#f59e0b;
      --bad:#e5484d;
      --neutral:#98a2b3;
      --soft:#eef4ff;
      --soft-red:#fff1f2;
      --red:#dc2626;
      --gray:#f1f5f9;
      --shadow:0 10px 28px rgba(15,23,42,.10);
      --radius:18px;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      background:linear-gradient(180deg,#eef5ff 0%,var(--bg) 42%,#f9fbff 100%);
      color:var(--ink);
      min-height:100vh;
      -webkit-text-size-adjust:100%;
    }

    .wrap{
      width:min(760px,calc(100% - 20px));
      margin:0 auto;
      padding:14px 0 28px;
    }

    .hide{display:none!important;}

    .gate-card,
    .top-status-card,
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .gate-card{
      padding:18px;
      margin-bottom:12px;
      text-align:center;
    }

    .gate-title{
      margin:0 0 8px;
      font-size:22px;
      font-weight:950;
    }

    .gate-text{
      margin:0;
      color:var(--muted);
      font-weight:850;
      line-height:1.5;
    }
    .gate-text.ok{color:#067647;}
    .gate-text.warn{color:#92400e;}
    .gate-text.bad{color:#b42318;}

    .top-status-card{
      display:grid;
      grid-template-columns:minmax(0,1fr) 42px 32px;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      margin-bottom:12px;
      position:sticky;
      top:8px;
      z-index:20;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(8px);
    }

    .user-box{
      min-width:0;
      font-weight:950;
      color:#344054;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .home-jump-btn{
      flex:0 0 auto;
      width:42px;
      height:40px;
      border-radius:14px;
      border:1px solid #c8d8f2;
      background:#eef4ff;
      color:#1d4ed8;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:23px;
      font-weight:950;
      line-height:1;
      box-shadow:0 6px 14px rgba(37,95,188,.12);
    }
    .home-jump-btn:active{transform:scale(.96);}

    .gas-lamp-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .gas-lamp{
      width:22px;
      height:22px;
      border-radius:50%;
      background:var(--neutral);
      box-shadow:0 0 0 4px rgba(37,95,188,.08),0 0 14px rgba(37,95,188,.16);
      flex:0 0 auto;
    }
    .gas-lamp.checking{background:var(--neutral);}
    .gas-lamp.ok{background:var(--ok);}
    .gas-lamp.warn{background:var(--warn);}
    .gas-lamp.bad{background:var(--bad);}

    .card{
      padding:16px;
      margin-top:12px;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    h1,h2{
      margin:0;
      line-height:1.2;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    h1{font-size:clamp(22px,5vw,32px);}
    h2{font-size:20px;}

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{min-width:0;}
    .field.full{grid-column:1/-1;}

    label{
      display:block;
      font-size:13px;
      color:#344054;
      font-weight:900;
      margin-bottom:6px;
    }

    input,select,button{font:inherit;}

    input,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 12px;
      outline:none;
      background:#fff;
      min-height:46px;
      font-size:16px;
    }

    input:focus,select:focus{
      border-color:#6aa1ff;
      box-shadow:0 0 0 4px rgba(37,95,188,.10);
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:11px 14px;
      min-height:46px;
      font-weight:950;
      cursor:pointer;
      transition:transform .12s ease,opacity .12s ease,box-shadow .12s ease;
      white-space:nowrap;
    }
    .btn:active{transform:scale(.98);}
    .btn:disabled{opacity:.52;cursor:not-allowed;transform:none;}

    .btn-primary{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;
      box-shadow:0 8px 18px rgba(37,95,188,.24);
    }
    .btn-soft{
      background:#eef4ff;
      color:var(--brand2);
      border:1px solid #c8d8f2;
    }
    .btn-danger{
      background:#fff1f2;
      color:#be123c;
      border:1px solid #fecdd3;
    }
    .btn-ok{
      background:#ecfdf3;
      color:#067647;
      border:1px solid #abefc6;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .mode-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0 0 12px;
      flex-wrap:wrap;
    }

    .mode-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid #c8d8f2;
      background:#eef4ff;
      color:#174c99;
      border-radius:999px;
      padding:7px 10px;
      font-weight:950;
      font-size:13px;
    }

    .msg{
      min-height:20px;
      margin-top:10px;
      font-size:14px;
      font-weight:850;
      color:var(--muted);
    }
    .msg.ok{color:#067647;}
    .msg.bad{color:#b42318;}
    .msg.warn{color:#92400e;}

    .list-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .filter-group{
      display:flex;
      gap:6px;
      flex-wrap:nowrap;
    }

    .filter-btn{
      min-width:46px;
      min-height:38px;
      border-radius:999px;
      padding:8px 10px;
      border:1px solid #c8d8f2;
      background:#fff;
      color:#174c99;
      font-weight:950;
      cursor:pointer;
    }
    .filter-btn.active{
      background:#174c99;
      color:#fff;
      border-color:#174c99;
    }

    .person-head{
      font-size:12px;
      color:var(--muted);
      font-weight:950;
      padding:0 10px 2px 15px;
      display:grid;
      grid-template-columns:1.1fr 1.4fr .55fr .8fr;
      gap:8px;
    }

    .person-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }

    .person-row{
      width:100%;
      border:1px solid var(--line);
      border-left:5px solid transparent;
      border-radius:15px;
      background:#fff;
      display:grid;
      grid-template-columns:1.1fr 1.4fr .55fr .8fr;
      gap:8px;
      align-items:center;
      min-height:48px;
      padding:9px 10px;
      text-align:left;
      cursor:pointer;
      color:var(--ink);
    }
    .person-row.is-admin{
      background:var(--soft-red);
      border-left-color:var(--red);
    }
    .person-row.is-disabled{
      background:var(--gray);
      color:#94a3b8;
      opacity:.82;
    }
    .person-row.is-admin.is-disabled{
      background:#f8fafc;
      border-left-color:var(--red);
    }
    .person-row:active{transform:scale(.992);}

    .cell{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-weight:900;
    }
    .cell.status-text{
      font-size:13px;
      text-align:center;
      border-radius:999px;
      padding:4px 6px;
      background:#ecfdf3;
      color:#067647;
    }
    .person-row.is-disabled .status-text{
      background:#e2e8f0;
      color:#64748b;
    }

    .small-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      margin-top:8px;
    }

    @media(max-width:560px){
      .wrap{width:min(100% - 14px,760px);}
      .top-status-card{top:6px;grid-template-columns:minmax(0,1fr) 40px 30px;gap:8px;padding:9px 10px;}
      .home-jump-btn{width:40px;height:38px;font-size:22px;}
      .gas-lamp{width:20px;height:20px;}
      .card{padding:14px;}
      .grid{grid-template-columns:1fr;}
      .actions{grid-template-columns:1fr;}
      .person-head{display:none;}
      .person-row{
        grid-template-columns:1fr auto;
        gap:6px 10px;
      }
      .person-row .cell:nth-child(1){grid-column:1/2;}
      .person-row .cell:nth-child(2){grid-column:1/2;}
      .person-row .cell:nth-child(3){grid-column:2/3;grid-row:1/2;text-align:right;}
      .person-row .cell:nth-child(4){grid-column:2/3;grid-row:2/3;}
      .list-toolbar{align-items:stretch;}
      .filter-group{width:100%;display:grid;grid-template-columns:repeat(4,1fr);}
      .list-toolbar>.btn{width:100%;}
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section id="gateCard" class="gate-card">
      <h1 class="gate-title">人員管理</h1>
      <p id="gateStatus" class="gate-text warn">管理權限檢查中...</p>
    </section>

    <section id="topStatusBar" class="top-status-card hide">
      <div id="userBox" class="user-box">目前管理者：----</div>
      <a class="home-jump-btn" href="./index.html" title="返回首頁" aria-label="返回首頁">⌂</a>
      <div class="gas-lamp-wrap" id="gasStatusWrap" title="GAS 伺服狀態：檢查中" aria-label="GAS 伺服狀態：檢查中">
        <span class="gas-lamp checking" id="gasLamp"></span>
      </div>
    </section>

    <section id="listPanel" class="card hide">
      <div class="section-head">
        <h2>人員名單</h2>
      </div>

      <div class="list-toolbar">
        <button type="button" class="btn btn-soft" id="toggleListBtn">顯示名單</button>
        <button type="button" class="btn btn-soft hide" id="reloadListBtn">重新整理</button>
        <div id="filterGroup" class="filter-group hide">
          <button type="button" class="filter-btn active" data-filter="ALL">ALL</button>
          <button type="button" class="filter-btn" data-filter="A">A</button>
          <button type="button" class="filter-btn" data-filter="B">B</button>
          <button type="button" class="filter-btn" data-filter="C">C</button>
        </div>
      </div>

      <div id="listMsg" class="msg">名單尚未載入。</div>

      <div id="personHead" class="person-head hide">
        <div>ID</div>
        <div>姓名</div>
        <div>班別</div>
        <div>狀態</div>
      </div>

      <div id="personList" class="person-list hide"></div>
      <div class="small-note">紅色系代表管理人員；密碼不在名單顯示，點擊人員列後帶入密碼欄。</div>
    </section>

    <section id="adminPanel" class="card hide">
      <div class="section-head">
        <h2>人員管理</h2>
      </div>

      <div class="mode-row">
        <span id="modeBadge" class="mode-badge">目前模式：新增人員</span>
        <button type="button" class="btn btn-soft" id="newUserBtn">新增人員</button>
      </div>

      <form id="saveForm" autocomplete="off">
        <div class="grid">
          <div class="field">
            <label for="idInput">人員 ID</label>
            <input id="idInput" name="id" type="text" maxlength="5" inputmode="text" autocomplete="off" placeholder="5碼英數">
          </div>

          <div class="field">
            <label for="passInput">密碼</label>
            <input id="passInput" name="pass" type="password" autocomplete="new-password" placeholder="英數密碼">
          </div>

          <div class="field">
            <label for="nameInput">姓名</label>
            <input id="nameInput" name="name" type="text" autocomplete="off" placeholder="姓名">
          </div>

          <div class="field">
            <label for="shiftInput">預設班別</label>
            <select id="shiftInput" name="shift">
              <option value="">請選擇</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="saveBtn">儲存</button>
          <button type="button" class="btn btn-danger" id="disableBtn">停用</button>
          <button type="button" class="btn btn-ok" id="enableBtn">啟用</button>
        </div>

        <div id="actionMsg" class="msg"></div>
      </form>
    </section>

    <footer class="small-note" style="text-align:center;padding:16px 0 4px;">admin3.html v0.1.0</footer>
  </main>

<script>
  const VERSION = 'admin3.html v0.1.0';

  const LOGIN_DRAFT_KEY = 'PI_LOGIN_DRAFT_V001';
  const SHORT_AUTH_KEY = 'PI_SHORT_AUTH_V001';
  const AUTH_EXPIRE_MS = 2 * 60 * 60 * 1000;
  const POST_TIMEOUT_MS = 15000;
  const PING_TIMEOUT_MS = 6000;

  let authState = null;
  let loginDraft = null;
  let personnelRows = [];
  let listLoaded = false;
  let listVisible = false;
  let currentFilter = 'ALL';
  let selectedRow = null;

  const el = {
    gateCard: document.getElementById('gateCard'),
    gateStatus: document.getElementById('gateStatus'),
    topStatusBar: document.getElementById('topStatusBar'),
    gasLamp: document.getElementById('gasLamp'),
    gasStatusWrap: document.getElementById('gasStatusWrap'),
    userBox: document.getElementById('userBox'),
    adminPanel: document.getElementById('adminPanel'),
    listPanel: document.getElementById('listPanel'),

    modeBadge: document.getElementById('modeBadge'),
    newUserBtn: document.getElementById('newUserBtn'),
    saveForm: document.getElementById('saveForm'),
    idInput: document.getElementById('idInput'),
    passInput: document.getElementById('passInput'),
    nameInput: document.getElementById('nameInput'),
    shiftInput: document.getElementById('shiftInput'),
    saveBtn: document.getElementById('saveBtn'),
    disableBtn: document.getElementById('disableBtn'),
    enableBtn: document.getElementById('enableBtn'),
    actionMsg: document.getElementById('actionMsg'),

    toggleListBtn: document.getElementById('toggleListBtn'),
    reloadListBtn: document.getElementById('reloadListBtn'),
    filterGroup: document.getElementById('filterGroup'),
    listMsg: document.getElementById('listMsg'),
    personHead: document.getElementById('personHead'),
    personList: document.getElementById('personList')
  };

  document.addEventListener('DOMContentLoaded', init);

  async function init(){
    bindEvents();
    await ping();

    const ok = await prepareAdminGate();

    if (!ok) {
      setGate('驗證失敗，1 秒後返回首頁。', 'bad');
      setTimeout(function(){ location.href = './index.html'; }, 1000);
      return;
    }

    showAdmin();
  }

  function getApiUrl(){
    return typeof window.api_url === 'string' && window.api_url.trim() ? window.api_url.trim() : '';
  }

  function nowValue(){
    return Number(window.CFG_time || Date.now());
  }

  function bindEvents(){
    el.idInput.addEventListener('input', function(){
      el.idInput.value = normalizeId(el.idInput.value);
    });

    el.passInput.addEventListener('input', function(){
      el.passInput.value = String(el.passInput.value || '').replace(/[^A-Za-z0-9]/g, '');
    });

    el.nameInput.addEventListener('input', function(){
      el.nameInput.value = String(el.nameInput.value || '').trimStart();
    });

    el.newUserBtn.addEventListener('click', clearFormForNew);
    el.saveForm.addEventListener('submit', function(evt){
      evt.preventDefault();
      savePersonnel('');
    });

    el.disableBtn.addEventListener('click', function(){
      savePersonnel('FALSE');
    });

    el.enableBtn.addEventListener('click', function(){
      savePersonnel('TRUE');
    });

    el.toggleListBtn.addEventListener('click', toggleListPanel);
    el.reloadListBtn.addEventListener('click', function(){
      loadPersonnelList(true);
    });

    el.filterGroup.addEventListener('click', function(evt){
      const btn = evt.target.closest('[data-filter]');
      if (!btn) return;

      currentFilter = btn.dataset.filter || 'ALL';
      Array.from(el.filterGroup.querySelectorAll('.filter-btn')).forEach(function(node){
        node.classList.toggle('active', node === btn);
      });

      renderPersonnelList();
    });
  }

  async function ping(){
    if (!getApiUrl()) {
      setGas('GAS 伺服狀態：找不到 api_url', 'bad');
      return;
    }

    setGas('GAS 伺服狀態：檢查中', 'checking');

    const controller = new AbortController();
    const timer = setTimeout(function(){
      controller.abort();
    }, PING_TIMEOUT_MS);

    try {
      const res = await fetch(getApiUrl() + '?t=' + nowValue(), {
        method: 'GET',
        cache: 'no-store',
        signal: controller.signal
      });

      clearTimeout(timer);

      if (res && res.status === 200) {
        setGas('GAS 伺服狀態：ok', 'ok');
      } else {
        setGas('GAS 伺服狀態：回應異常', 'bad');
      }
    } catch (err) {
      clearTimeout(timer);
      setGas('GAS 伺服狀態：伺服器沒有回應', 'bad');
    }
  }

  async function prepareAdminGate(){
    loginDraft = readJson(LOGIN_DRAFT_KEY);
    const shortAuth = readJson(SHORT_AUTH_KEY);

    if (!loginDraft || !loginDraft.id || !loginDraft.pass) {
      setGate('找不到帳密草稿。', 'bad');
      return false;
    }

    if (isShortAuthValid(shortAuth, loginDraft.id) && isAdminValue(shortAuth.admin)) {
      authState = shortAuth;
      setGate('管理權限通過。', 'ok');
      return true;
    }

    setGate('通行證失效，原地驗證中...', 'warn');

    const renewed = await renewAuth(loginDraft.id, loginDraft.pass);

    if (renewed && isAdminValue(renewed.admin)) {
      authState = renewed;
      setGate('管理權限通過。', 'ok');
      return true;
    }

    return false;
  }

  function isShortAuthValid(shortAuth, draftId){
    if (!shortAuth || !shortAuth.id) return false;

    const a = normalizeId(shortAuth.id);
    const b = normalizeId(draftId);

    if (!a || !b || a !== b) return false;

    const expireTime = Number(shortAuth.expire_time || 0);
    return Number.isFinite(expireTime) && nowValue() < expireTime;
  }

  async function renewAuth(id, pass){
    const params = new URLSearchParams();
    params.set('action', 'auth');
    params.set('id', normalizeId(id));
    params.set('pass', String(pass || '').trim());

    try {
      const data = await postWithTimeout(params, POST_TIMEOUT_MS);
      if (!data || data.status !== 'ok') return null;

      const user = fieldsValuesToObject(data);
      const now = nowValue();

      const renewed = {
        id: normalizeId(user.id || id),
        name: String(user.name || ''),
        shift: normalizeShift(user.shift || ''),
        admin: isAdminValue(user.admin),
        auth_time: now,
        expire_time: now + AUTH_EXPIRE_MS
      };

      writeJson(SHORT_AUTH_KEY, renewed);
      return renewed;
    } catch (err) {
      return null;
    }
  }

  function showAdmin(){
    el.gateCard.classList.add('hide');
    el.topStatusBar.classList.remove('hide');
    el.listPanel.classList.remove('hide');
    el.adminPanel.classList.remove('hide');

    el.userBox.textContent = '目前管理者：' + (authState.id || '----') + '　' + (authState.name || '');
    clearFormForNew();
  }

  function clearFormForNew(){
    selectedRow = null;
    el.idInput.value = '';
    el.passInput.value = '';
    el.nameInput.value = '';
    el.shiftInput.value = '';
    el.idInput.readOnly = false;
    setMode('目前模式：新增人員');
    setActionMsg('', '');
    updateActionButtons();
  }

  function setMode(text){
    el.modeBadge.textContent = text;
  }

  function fillFormFromRow(row){
    selectedRow = row || null;

    el.idInput.value = row.id || '';
    el.passInput.value = row.pass || '';
    el.nameInput.value = row.name || '';
    el.shiftInput.value = row.shift || '';

    setMode('目前模式：修改人員 ' + (row.id || ''));
    setActionMsg('已帶入人員資料。', 'ok');
    updateActionButtons();
  }

  function updateActionButtons(){
    if (!selectedRow) {
      el.disableBtn.disabled = true;
      el.enableBtn.disabled = true;
      return;
    }

    el.disableBtn.disabled = selectedRow.admin || !selectedRow.active;
    el.enableBtn.disabled = selectedRow.active;
  }

  async function savePersonnel(activeValue){
    setActionMsg('', '');

    const id = normalizeId(el.idInput.value);
    const pass = String(el.passInput.value || '').trim();
    const name = String(el.nameInput.value || '').trim();
    const shift = normalizeShift(el.shiftInput.value);

    if (!/^[A-Z0-9]{5}$/.test(id)) {
      setActionMsg('ID 必須為 5 碼英數。', 'bad');
      return;
    }

    if (activeValue === 'FALSE') {
      if (selectedRow && selectedRow.admin) {
        setActionMsg('管理人員不可停用。', 'bad');
        return;
      }
    } else {
      if (!/^[A-Za-z0-9]+$/.test(pass)) {
        setActionMsg('密碼只能使用英數，且不可空白。', 'bad');
        return;
      }

      if (name.length <= 1) {
        setActionMsg('姓名長度不足。', 'bad');
        return;
      }

      if (!/^[ABC]$/.test(shift)) {
        setActionMsg('請選擇班別 A/B/C。', 'bad');
        return;
      }
    }

    const params = new URLSearchParams();
    params.set('action', 'personnel_save');
    params.set('admin_id', normalizeId(loginDraft.id));
    params.set('admin_pass', String(loginDraft.pass || ''));
    params.set('id', id);

    if (activeValue !== 'FALSE') {
      params.set('pass', pass);
      params.set('name', name);
      params.set('shift', shift);
    }

    if (activeValue) {
      params.set('active', activeValue);
    }

    setActionMsg(activeValue === 'FALSE' ? '停用中...' : activeValue === 'TRUE' ? '啟用中...' : '儲存中...', 'warn');

    try {
      const data = await postWithTimeout(params, POST_TIMEOUT_MS);

      if (data && data.status === 'ok') {
        setActionMsg('操作完成。', 'ok');

        if (listLoaded) {
          await loadPersonnelList(true);
        }

        if (activeValue === 'FALSE') {
          clearFormForNew();
        }

        return;
      }

      setActionMsg('操作失敗：' + (data && data.msg ? data.msg : 'unknown_error'), 'bad');

    } catch (err) {
      setActionMsg('操作失敗：' + formatError(err), 'bad');
    }
  }

  async function toggleListPanel(){
    if (!listVisible) {
      listVisible = true;
      el.toggleListBtn.textContent = '隱藏名單';
      el.reloadListBtn.classList.remove('hide');
      el.filterGroup.classList.remove('hide');

      if (!listLoaded) {
        await loadPersonnelList(false);
      } else {
        renderPersonnelList();
      }

      return;
    }

    listVisible = false;
    el.toggleListBtn.textContent = '顯示名單';
    el.reloadListBtn.classList.add('hide');
    el.filterGroup.classList.add('hide');
    el.personHead.classList.add('hide');
    el.personList.classList.add('hide');
    setListMsg('名單已隱藏。', '');
  }

  async function loadPersonnelList(force){
    if (listLoaded && !force) {
      renderPersonnelList();
      return;
    }

    setListMsg('名單讀取中...', 'warn');

    const params = new URLSearchParams();
    params.set('action', 'personnel_list');

    try {
      const data = await postWithTimeout(params, POST_TIMEOUT_MS);

      if (!data || data.status !== 'ok') {
        setListMsg('名單讀取失敗：' + (data && data.msg ? data.msg : 'unknown_error'), 'bad');
        return;
      }

      personnelRows = normalizePersonnelRows(data);
      listLoaded = true;
      renderPersonnelList();

    } catch (err) {
      setListMsg('名單讀取失敗：' + formatError(err), 'bad');
    }
  }

  function normalizePersonnelRows(data){
    if (!data || !Array.isArray(data.fields) || !Array.isArray(data.values)) {
      return [];
    }

    return data.values.map(function(row){
      const obj = {};
      data.fields.forEach(function(field, index){
        obj[field] = row[index];
      });

      return {
        id: normalizeId(obj.id || ''),
        pass: String(obj.pass || ''),
        name: String(obj.name || ''),
        shift: normalizeShift(obj.shift || ''),
        active: parseActiveValue(obj.active),
        admin: isAdminValue(obj.admin)
      };
    }).filter(function(row){
      return row.id;
    }).sort(function(a,b){
      return String(a.shift || '').localeCompare(String(b.shift || '')) ||
        String(a.id || '').localeCompare(String(b.id || ''));
    });
  }

  function renderPersonnelList(){
    if (!listVisible) return;

    const rows = personnelRows.filter(function(row){
      return currentFilter === 'ALL' || row.shift === currentFilter;
    });

    el.personList.innerHTML = '';

    if (!rows.length) {
      el.personHead.classList.add('hide');
      el.personList.classList.add('hide');
      setListMsg('沒有符合條件的人員。', 'warn');
      return;
    }

    setListMsg('共 ' + rows.length + ' 筆。', 'ok');
    el.personHead.classList.remove('hide');
    el.personList.classList.remove('hide');

    rows.forEach(function(row){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'person-row' + (row.admin ? ' is-admin' : '') + (!row.active ? ' is-disabled' : '');
      btn.innerHTML = [
        '<div class="cell">' + escapeHtml(row.id) + '</div>',
        '<div class="cell">' + escapeHtml(row.name) + '</div>',
        '<div class="cell">' + escapeHtml(row.shift || '-') + '</div>',
        '<div class="cell status-text">' + (row.active ? '啟用' : '停用') + '</div>'
      ].join('');

      btn.addEventListener('click', function(){
        fillFormFromRow(row);
      });

      el.personList.appendChild(btn);
    });
  }

  async function postWithTimeout(params, timeoutMs){
    const controller = new AbortController();
    const timer = setTimeout(function(){
      controller.abort();
    }, timeoutMs);

    try {
      const res = await fetch(getApiUrl(), {
        method:'POST',
        body:params,
        signal:controller.signal
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error('GAS 回傳不是 JSON');
      }
    } finally {
      clearTimeout(timer);
    }
  }

  function fieldsValuesToObject(data){
    const out = {};

    if (!data || !Array.isArray(data.fields) || !Array.isArray(data.values)) {
      return out;
    }

    data.fields.forEach(function(key,index){
      out[key] = data.values[index];
    });

    return out;
  }

  function parseActiveValue(value){
    if (value === false) return false;

    const v = String(value == null ? '' : value).trim().toUpperCase();

    if (v === 'FALSE' || v === 'F' || v === '0') return false;
    return true;
  }

  function isAdminValue(value){
    if (value === true) return true;

    const v = String(value == null ? '' : value).trim().toUpperCase();

    return v === 'TRUE' || v === 'T' || v === '1';
  }

  function normalizeId(value){
    return String(value || '').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,5);
  }

  function normalizeShift(value){
    const v = String(value || '').trim().toUpperCase();
    return /^[ABC]$/.test(v) ? v : '';
  }

  function setGas(text,type){
    el.gasLamp.className = 'gas-lamp ' + (type || 'checking');
    el.gasStatusWrap.title = text;
    el.gasStatusWrap.setAttribute('aria-label', text);
  }

  function setGate(text,type){
    el.gateStatus.textContent = text;
    el.gateStatus.className = 'gate-text ' + (type || 'warn');
  }

  function setActionMsg(text,type){
    el.actionMsg.textContent = text || '';
    el.actionMsg.className = 'msg ' + (type || '');
  }

  function setListMsg(text,type){
    el.listMsg.textContent = text || '';
    el.listMsg.className = 'msg ' + (type || '');
  }

  function readJson(key){
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (err) {
      return null;
    }
  }

  function writeJson(key,value){
    localStorage.setItem(key,JSON.stringify(value));
  }

  function escapeHtml(value){
    return String(value == null ? '' : value).replace(/[&<>"]/g,function(ch){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];
    });
  }

  function formatError(err){
    if (!err) return 'unknown_error';
    if (err.name === 'AbortError') return 'timeout';
    return String(err.message || err);
  }
</script>
</body>
</html>

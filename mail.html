<!doctype html>
<html lang="zh-Hant">
<head>
  <script src="./config.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>巡檢郵件匯出</title>
  <style>
    :root{
      --bg:#f4f7fb; --text:#1f2937; --muted:#64748b;
      --main:#2563eb; --main2:#1d4ed8; --ok:#16a34a;
      --warn:#f59e0b; --bad:#dc2626; --line:#d9e2ef;
      --soft:#eef4ff; --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",Arial,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 34%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      -webkit-text-size-adjust:100%;
    }
    .page{ width:min(720px, 100%); margin:0 auto; padding:12px 10px 24px; }
    .top{
      position:sticky; top:0; z-index:10;
      display:grid; grid-template-columns:minmax(0,1fr) auto 42px 34px;
      align-items:center; gap:8px; padding:10px 4px 12px;
      background:linear-gradient(180deg, rgba(248,251,255,.98), rgba(248,251,255,.92));
      backdrop-filter:blur(8px);
    }
    .title{
      margin:0; font-size:22px; line-height:1.18; letter-spacing:.02em;
      font-weight:950; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .time{ color:#334155; font-size:13px; font-weight:950; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .home{
      width:40px; height:38px; border-radius:13px; border:1px solid rgba(37,99,235,.18);
      color:#1d4ed8; background:#eff6ff; display:inline-flex; align-items:center; justify-content:center;
      text-decoration:none; font-size:23px; font-weight:950; line-height:1; box-shadow:0 6px 14px rgba(37,99,235,.10);
    }
    .gas-wrap{ display:flex; align-items:center; justify-content:center; }
    .gas-dot{ width:18px; height:18px; border-radius:999px; background:var(--warn); box-shadow:0 0 0 4px rgba(245,158,11,.14); }
    .gas-dot.ok{ background:var(--ok); box-shadow:0 0 0 4px rgba(22,163,74,.13); }
    .gas-dot.bad{ background:var(--bad); box-shadow:0 0 0 4px rgba(220,38,38,.13); }
    .card{
      margin-top:12px; border:1px solid rgba(226,232,240,.96); border-radius:var(--radius);
      background:rgba(255,255,255,.96); box-shadow:var(--shadow); overflow:hidden;
    }
    .card-head{
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      padding:12px 14px 10px; border-bottom:1px solid rgba(226,232,240,.72);
      background:linear-gradient(180deg, rgba(248,251,255,.95), rgba(255,255,255,.95));
    }
    .card-title{ margin:0; font-size:18px; font-weight:950; }
    .badge{
      display:inline-flex; align-items:center; justify-content:center; min-height:26px; padding:3px 9px;
      border-radius:999px; color:#1d4ed8; background:var(--soft); border:1px solid rgba(147,197,253,.42);
      font-size:13px; font-weight:950; white-space:nowrap;
    }
    .card-body{ padding:14px; }
    .field-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    label{ display:block; color:#0f172a; font-size:13px; font-weight:950; margin-bottom:6px; }
    input{
      width:100%; min-height:44px; border:1px solid var(--line); border-radius:14px; padding:10px 12px;
      color:var(--text); background:#fff; font-size:16px; font-weight:850; outline:none;
    }
    input:focus{ border-color:#93c5fd; box-shadow:0 0 0 4px rgba(37,99,235,.12); }
    .hint{ margin:10px 0 0; color:var(--muted); font-size:13px; line-height:1.5; font-weight:850; }
    .actions{ display:grid; grid-template-columns:1fr; gap:9px; margin-top:13px; }
    .btn{
      min-height:44px; border:0; border-radius:999px; color:#fff;
      background:linear-gradient(135deg, var(--main), var(--main2));
      box-shadow:0 9px 20px rgba(37,99,235,.18); font-size:16px; font-weight:950; cursor:pointer;
    }
    .btn.soft{ border:1px solid rgba(37,99,235,.22); color:#1d4ed8; background:#eff6ff; box-shadow:none; }
    .btn:active,.home:active{ transform:scale(.98); }
    .btn:disabled{ opacity:.58; cursor:not-allowed; transform:none; }
    .msg{ min-height:22px; margin-top:10px; color:var(--muted); font-size:13px; font-weight:900; text-align:center; line-height:1.45; }
    .msg.ok{ color:var(--ok); } .msg.bad{ color:var(--bad); } .msg.warn{ color:#b45309; }
    .gate{
      margin-top:18px; padding:18px 14px; border:1px solid var(--line); border-radius:var(--radius);
      background:#fff; box-shadow:var(--shadow); text-align:center; font-size:15px; font-weight:900; color:var(--muted);
    }
    .hidden{ display:none!important; }
    .footer{ padding:18px 0 4px; color:#7a8798; text-align:center; font-size:12px; font-weight:800; }
    @media (max-width:390px){
      .page{ padding:10px 8px 22px; }
      .top{ grid-template-columns:minmax(0,1fr) auto 38px 30px; gap:6px; }
      .title{ font-size:19px; } .time{ font-size:12px; }
      .home{ width:38px; height:36px; font-size:21px; }
      .gas-dot{ width:16px; height:16px; }
      .card-head{ padding:11px 12px 9px; }
      .card-body{ padding:12px; }
      .field-grid{ gap:8px; }
      .btn{ min-height:42px; font-size:15px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="top">
      <h1 class="title">郵件匯出</h1>
      <div class="time" id="localTime">-- --:--:--</div>
      <a class="home" href="./index.html" title="返回首頁" aria-label="返回首頁">⌂</a>
      <div class="gas-wrap" title="GAS 狀態" aria-label="GAS 狀態"><span class="gas-dot" id="gasDot"></span></div>
    </section>

    <section class="gate" id="gateBox">正在確認管理權限...</section>

    <section id="mainPanel" class="hidden">
      <section class="card" aria-label="區間匯出">
        <div class="card-head"><h2 class="card-title">區間匯出</h2><span class="badge">最長 6 個月</span></div>
        <div class="card-body">
          <div class="field-grid">
            <div><label for="startDate">起始日期</label><input id="startDate" type="date"></div>
            <div><label for="endDate">結束日期</label><input id="endDate" type="date"></div>
          </div>
          <p class="hint">依資料表 C 欄日期序號篩選，不限定班別。送出後會寄出 .xlsx 附件。</p>
          <div class="actions"><button type="button" class="btn" id="sendSpanBtn">寄出區間資料</button></div>
          <div class="msg" id="spanMsg"></div>
        </div>
      </section>

      <section class="card" aria-label="上月月報補寄">
        <div class="card-head"><h2 class="card-title">上月月報補寄</h2><span class="badge">上月 1 日至月底</span></div>
        <div class="card-body">
          <p class="hint">依 GAS 台灣時間判定上個月完整日期區間，並寄出 .xlsx 附件。</p>
          <div class="actions"><button type="button" class="btn soft" id="sendMonthBtn">寄出上月月報</button></div>
          <div class="msg" id="monthMsg"></div>
        </div>
      </section>

      <div class="msg" id="actionMsg"></div>
    </section>

    <footer class="footer">巡檢郵件匯出 mail.html v0.1.0</footer>
  </main>

  <script>
    'use strict';

    const LOGIN_DRAFT_KEY = 'PI_LOGIN_DRAFT_V001';
    const SHORT_AUTH_KEY = 'PI_SHORT_AUTH_V001';
    const MAX_SPAN_DAYS = 186;

    const el = {
      localTime:document.getElementById('localTime'),
      gasDot:document.getElementById('gasDot'),
      gateBox:document.getElementById('gateBox'),
      mainPanel:document.getElementById('mainPanel'),
      startDate:document.getElementById('startDate'),
      endDate:document.getElementById('endDate'),
      sendSpanBtn:document.getElementById('sendSpanBtn'),
      sendMonthBtn:document.getElementById('sendMonthBtn'),
      spanMsg:document.getElementById('spanMsg'),
      monthMsg:document.getElementById('monthMsg'),
      actionMsg:document.getElementById('actionMsg')
    };

    document.addEventListener('DOMContentLoaded', init);

    function init(){
      startClock();
      pingGasByGet();

      if (!getApiUrl()){
        showGate('找不到 config.js 內的 api_url。');
        return;
      }

      if (!hasAdminAccess()){
        showGate('此頁僅限管理權限使用，2 秒後返回首頁。');
        window.setTimeout(function(){ location.href = './index.html'; }, 2000);
        return;
      }

      el.gateBox.classList.add('hidden');
      el.mainPanel.classList.remove('hidden');
      setDefaultDates();
      bindEvents();
    }

    function bindEvents(){
      el.sendSpanBtn.addEventListener('click', sendSpanMail);
      el.sendMonthBtn.addEventListener('click', sendMonthMail);
    }

    function getApiUrl(){
      return typeof window.api_url === 'string' && window.api_url.trim() ? window.api_url.trim() : '';
    }

    function startClock(){
      renderClock();
      window.setInterval(renderClock, 1000);
    }

    function renderClock(){
      el.localTime.textContent = formatHeaderTime(window.CFG_now);
    }

    function formatHeaderTime(v){
      const s = String(v || '').trim();
      let m = s.match(/^(\d{4})\/(\d{2})\/(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
      if (m) return m[2] + '-' + m[3] + ' ' + m[4] + ':' + m[5] + ':' + m[6];
      m = s.match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}):(\d{2}):(\d{2})/);
      if (m) return m[2] + '-' + m[3] + ' ' + m[4] + ':' + m[5] + ':' + m[6];
      return '-- --:--:--';
    }

    function pingGasByGet(){
      if (!getApiUrl()){
        setGasStatus('bad');
        return;
      }

      setGasStatus('warn');

      fetch(getApiUrl(), { method:'GET', cache:'no-store' })
        .then(function(res){ return res.text(); })
        .then(function(text){
          const data = parseJsonSafe(text);
          setGasStatus(data && String(data.status || '').toLowerCase() === 'ok' ? 'ok' : 'bad');
        })
        .catch(function(){ setGasStatus('bad'); });
    }

    function setGasStatus(status){
      el.gasDot.classList.remove('ok', 'bad');
      if (status === 'ok') el.gasDot.classList.add('ok');
      else if (status === 'bad') el.gasDot.classList.add('bad');
    }

    function showGate(msg){
      el.gateBox.textContent = msg;
      el.gateBox.classList.remove('hidden');
      el.mainPanel.classList.add('hidden');
    }

    function readJsonStorage(key){
      try{
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      }catch(err){
        return null;
      }
    }

    function hasAdminAccess(){
      const shortAuth = readJsonStorage(SHORT_AUTH_KEY);
      if (!shortAuth || typeof shortAuth !== 'object') return false;

      const id = normalizeText(shortAuth.id).toUpperCase();
      if (!id) return false;
      if (!isShortAuthAlive(shortAuth)) return false;

      return isAdminValue(shortAuth.admin);
    }

    function isShortAuthAlive(shortAuth){
      const expireTime = Number(shortAuth && shortAuth.expire_time || 0);
      if (!expireTime) return false;
      return Number(window.CFG_time || 0) <= expireTime;
    }

    function isAdminValue(value){
      if (value === true) return true;
      const v = String(value == null ? '' : value).trim().toUpperCase();
      return v === 'TRUE' || v === 'T' || v === 'Y' || v === 'YES' || v === '1';
    }

    function setDefaultDates(){
      const now = new Date(Number(window.CFG_time || Date.now()));
      const first = new Date(now.getFullYear(), now.getMonth(), 1);
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      el.startDate.value = toDateInputValue(first);
      el.endDate.value = toDateInputValue(today);
    }

    function sendSpanMail(){
      clearMsg(el.actionMsg);
      clearMsg(el.monthMsg);

      const start = el.startDate.value;
      const end = el.endDate.value;

      if (!start || !end){
        setMsg(el.spanMsg, 'bad', '請選擇起始與結束日期。');
        return;
      }

      const startMs = parseDateInputMs(start);
      const endMs = parseDateInputMs(end);

      if (!Number.isFinite(startMs) || !Number.isFinite(endMs)){
        setMsg(el.spanMsg, 'bad', '日期格式異常。');
        return;
      }

      if (endMs < startMs){
        setMsg(el.spanMsg, 'bad', '結束日期不可早於起始日期。');
        return;
      }

      const days = Math.floor((endMs - startMs) / 86400000);
      if (days > MAX_SPAN_DAYS){
        setMsg(el.spanMsg, 'bad', '區間不可超過 6 個月。');
        return;
      }

      const p = new URLSearchParams();
      p.set('action', 'mail_send');
      p.set('mode', 'span');
      p.set('start_date', dateInputToSlash(start));
      p.set('end_date', dateInputToSlash(end));
      appendOperatorInfo(p);

      postMail(p, el.sendSpanBtn, el.spanMsg, '區間匯出完成');
    }

    function sendMonthMail(){
      clearMsg(el.actionMsg);
      clearMsg(el.spanMsg);

      const p = new URLSearchParams();
      p.set('action', 'mail_send');
      p.set('mode', 'month');
      appendOperatorInfo(p);

      postMail(p, el.sendMonthBtn, el.monthMsg, '上月月報已寄出');
    }

    function appendOperatorInfo(params){
      const loginDraft = readJsonStorage(LOGIN_DRAFT_KEY);
      const shortAuth = readJsonStorage(SHORT_AUTH_KEY);

      if (shortAuth && shortAuth.id) params.set('operator_id', normalizeText(shortAuth.id).toUpperCase());
      if (loginDraft && loginDraft.pass) params.set('operator_pass', String(loginDraft.pass || ''));
    }

    function postMail(params, button, msgTarget, okText){
      button.disabled = true;
      setMsg(msgTarget, 'warn', '寄送中...');

      fetch(getApiUrl(), { method:'POST', body:params })
        .then(function(res){ return res.text(); })
        .then(function(text){
          const data = parseJsonSafe(text);

          if (data && data.status === 'ok'){
            const n = Number(data.row_count || 0);
            setMsg(msgTarget, 'ok', okText + '，共 ' + n + ' 筆。');
            setMsg(el.actionMsg, 'ok', data.subject ? String(data.subject) : '');
            return;
          }

          setMsg(msgTarget, 'bad', '寄送失敗：' + (data && data.msg ? data.msg : '回應異常'));
        })
        .catch(function(){ setMsg(msgTarget, 'bad', '寄送失敗：GAS 無回應'); })
        .finally(function(){ button.disabled = false; });
    }

    function parseJsonSafe(text){
      try{ return JSON.parse(String(text || '').trim()); }
      catch(err){ return null; }
    }

    function parseDateInputMs(value){
      const m = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return NaN;
      return Date.UTC(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }

    function dateInputToSlash(value){
      const m = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return '';
      return m[1] + '/' + m[2] + '/' + m[3];
    }

    function toDateInputValue(date){
      return date.getFullYear() + '-' + pad2(date.getMonth() + 1) + '-' + pad2(date.getDate());
    }

    function setMsg(target, type, text){
      target.className = 'msg ' + (type || '');
      target.textContent = text || '';
    }

    function clearMsg(target){
      target.className = 'msg';
      target.textContent = '';
    }

    function normalizeText(value){
      return String(value == null ? '' : value).trim();
    }

    function pad2(n){
      return String(n).padStart(2, '0');
    }
  </script>
</body>
</html>
